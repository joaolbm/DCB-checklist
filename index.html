<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dom Cellebre Burger — Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --carvao-0:#141110;
  --carvao-1:#1C1815;
  --carvao-2:#251F1B;
  --carvao-3:#332B25;
  --creme:#F4EEE2;
  --creme-fosco:#C9C0AE;
  --brasa:#D9531E;
  --brasa-escuro:#A83E14;
  --queijo:#F2A93C;
  --queijo-escuro:#B87A1F;
  --alface:#4C9A2A;
  --alface-escuro:#2E5F19;
  --tomate:#C23B3B;
  --tomate-escuro:#7E2323;
  --azul:#3D7FBF;
  --azul-escuro:#25507A;
  --borda:#3A322B;
  --sombra:0 8px 24px rgba(0,0,0,.35);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--carvao-0);
  color:var(--creme);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  background-image:
    radial-gradient(circle at 10% 0%, rgba(217,83,30,.08), transparent 45%),
    radial-gradient(circle at 90% 100%, rgba(242,169,60,.06), transparent 40%);
}
h1,h2,h3,.display{font-family:'Archivo Black',sans-serif;font-weight:400;letter-spacing:.5px;}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--borda);border-radius:8px;}
a{color:inherit;}

#app{min-height:100vh;display:flex;flex-direction:column;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--carvao-1);border-bottom:1px solid var(--borda);
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:38px;height:38px;border-radius:10px;background:var(--brasa);
  display:flex;align-items:center;justify-content:center;font-family:'Archivo Black';
  color:var(--carvao-0);font-size:18px;flex-shrink:0;
}
.brand-text{line-height:1.15;}
.brand-text .t1{font-family:'Archivo Black';font-size:15px;color:var(--creme);}
.brand-text .t2{font-size:11px;color:var(--creme-fosco);text-transform:uppercase;letter-spacing:1px;}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--creme-fosco);}
.user-chip b{color:var(--creme);font-weight:600;}
.badge-role{
  font-size:10px;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;
}
.badge-admin{background:rgba(242,169,60,.18);color:var(--queijo);}
.badge-colab{background:rgba(61,127,191,.18);color:var(--azul);}
.btn-icon{
  width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:var(--carvao-2);border:1px solid var(--borda);font-size:16px;color:var(--creme-fosco);
}
.btn-icon:active{transform:scale(.94);}

.container{max-width:720px;margin:0 auto;width:100%;padding:20px;flex:1;}
.container-wide{max-width:1100px;}

/* ---------- BUTTONS ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 22px;border-radius:12px;font-weight:700;font-size:15px;
  transition:transform .1s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--brasa);color:#fff;box-shadow:0 4px 14px rgba(217,83,30,.35);}
.btn-primary:disabled{background:var(--carvao-3);color:var(--creme-fosco);box-shadow:none;opacity:.6;}
.btn-secondary{background:var(--carvao-2);color:var(--creme);border:1px solid var(--borda);}
.btn-ghost{background:transparent;color:var(--creme-fosco);border:1px solid var(--borda);}
.btn-success{background:var(--alface);color:#fff;}
.btn-danger{background:var(--tomate);color:#fff;}
.btn-block{width:100%;}
.btn-sm{padding:9px 14px;font-size:13px;border-radius:9px;}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-hero{text-align:center;margin-bottom:34px;}
.login-hero .brand-mark{width:64px;height:64px;font-size:30px;border-radius:16px;margin:0 auto 16px;}
.login-hero h1{font-size:26px;color:var(--creme);line-height:1.3;}
.login-hero p{color:var(--creme-fosco);font-size:13px;margin-top:8px;text-transform:uppercase;letter-spacing:1.5px;}
.login-card{
  width:100%;max-width:420px;background:var(--carvao-1);border:1px solid var(--borda);
  border-radius:20px;padding:24px;box-shadow:var(--sombra);
}
.login-section-label{
  font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--queijo);
  margin:18px 0 10px;font-weight:700;
}
.login-section-label:first-child{margin-top:0;}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.user-btn{
  padding:14px 10px;border-radius:12px;background:var(--carvao-2);border:1.5px solid var(--borda);
  text-align:center;font-weight:700;font-size:14px;transition:all .12s ease;
}
.user-btn:active{transform:scale(.96);}
.user-btn.selected{border-color:var(--brasa);background:rgba(217,83,30,.14);color:var(--brasa);}
.pass-field{
  width:100%;margin-top:18px;padding:14px 16px;border-radius:12px;background:var(--carvao-2);
  border:1.5px solid var(--borda);color:var(--creme);font-size:16px;outline:none;
}
.pass-field:focus{border-color:var(--brasa);}
.login-error{color:var(--tomate);font-size:13px;margin-top:10px;text-align:center;font-weight:600;}

/* ---------- SETUP FLOW (unidade/setor/tipo) ---------- */
.setup-wrap{padding:20px;max-width:520px;margin:0 auto;}
.setup-title{font-size:20px;margin-bottom:6px;}
.setup-sub{color:var(--creme-fosco);font-size:13px;margin-bottom:22px;}
.option-card{
  display:flex;align-items:center;gap:14px;padding:18px;border-radius:16px;
  background:var(--carvao-1);border:1.5px solid var(--borda);margin-bottom:12px;transition:all .12s ease;
}
.option-card:active{transform:scale(.98);}
.option-card.selected{border-color:var(--brasa);background:rgba(217,83,30,.1);}
.option-icon{
  width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;background:var(--carvao-2);
}
.option-title{font-weight:700;font-size:15px;}
.option-sub{font-size:12px;color:var(--creme-fosco);margin-top:2px;}
.step-dots{display:flex;gap:6px;margin-bottom:20px;}
.step-dot{height:4px;flex:1;border-radius:4px;background:var(--carvao-3);}
.step-dot.active{background:var(--brasa);}
.step-dot.done{background:var(--alface);}

/* ---------- CHECKLIST ---------- */
.checklist-header{
  background:var(--carvao-1);border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid var(--borda);
  position:relative;overflow:hidden;
}
.checklist-header::before{
  content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle, rgba(217,83,30,.15), transparent 70%);
}
.comanda-tag{
  display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--queijo);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px;
}
.checklist-header h2{font-size:19px;line-height:1.3;}
.checklist-meta{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--creme-fosco);flex-wrap:wrap;}
.checklist-meta span{display:flex;align-items:center;gap:5px;}

.progress-track{
  height:10px;background:var(--carvao-3);border-radius:20px;overflow:hidden;margin-top:16px;position:relative;
}
.progress-fill{
  height:100%;border-radius:20px;background:linear-gradient(90deg,var(--tomate),var(--queijo),var(--alface));
  transition:width .35s ease;
}
.progress-label{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--creme-fosco);font-weight:600;}
.progress-label b{color:var(--creme);}

.task-item{
  display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--carvao-1);
  border:1px solid var(--borda);border-radius:14px;margin-bottom:10px;transition:all .15s ease;
}
.task-item.done{border-color:rgba(76,154,42,.4);background:rgba(76,154,42,.06);}
.task-check{
  width:26px;height:26px;border-radius:8px;border:2px solid var(--creme-fosco);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;transition:all .15s ease;
}
.task-item.done .task-check{background:var(--alface);border-color:var(--alface);color:#fff;}
.task-body{flex:1;min-width:0;}
.task-name{font-weight:600;font-size:14.5px;line-height:1.4;}
.task-item.done .task-name{color:var(--creme-fosco);text-decoration:line-through;text-decoration-color:var(--alface-escuro);}
.task-pts{
  display:inline-block;font-size:11px;font-weight:700;color:var(--queijo);background:rgba(242,169,60,.14);
  padding:2px 8px;border-radius:20px;margin-top:6px;
}
.task-req{color:var(--tomate);font-size:10px;font-weight:700;margin-left:6px;text-transform:uppercase;}
.task-done-info{font-size:11.5px;color:var(--alface);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;}
.task-late{color:var(--tomate)!important;}
.task-admin-actions{display:flex;gap:6px;margin-top:8px;}

.fab-finish{
  position:sticky;bottom:16px;margin-top:20px;
}

/* ---------- CARDS / DASHBOARD ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.stat-card{
  background:var(--carvao-1);border:1px solid var(--borda);border-radius:16px;padding:16px;
}
.stat-card .val{font-family:'Archivo Black';font-size:24px;color:var(--creme);}
.stat-card .lbl{font-size:11.5px;color:var(--creme-fosco);text-transform:uppercase;letter-spacing:.7px;margin-top:4px;font-weight:600;}
.stat-card.accent-brasa .val{color:var(--brasa);}
.stat-card.accent-queijo .val{color:var(--queijo);}
.stat-card.accent-alface .val{color:var(--alface);}
.stat-card.accent-tomate .val{color:var(--tomate);}
.stat-card.accent-azul .val{color:var(--azul);}

.section-title{font-size:17px;margin:24px 0 14px;display:flex;align-items:center;gap:10px;}
.section-title .line{flex:1;height:1px;background:var(--borda);}

.card{background:var(--carvao-1);border:1px solid var(--borda);border-radius:16px;padding:18px;margin-bottom:14px;}

.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;}
.tab{
  padding:10px 16px;border-radius:11px;font-size:13px;font-weight:700;white-space:nowrap;
  background:var(--carvao-2);color:var(--creme-fosco);border:1px solid var(--borda);flex-shrink:0;
}
.tab.active{background:var(--brasa);color:#fff;border-color:var(--brasa);}

/* ---------- RANKING / PODIUM ---------- */
.podium{display:flex;align-items:flex-end;gap:10px;justify-content:center;margin:20px 0 26px;}
.podium-spot{flex:1;max-width:120px;text-align:center;}
.podium-avatar{
  width:56px;height:56px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black';font-size:20px;border:3px solid var(--carvao-0);
}
.podium-1 .podium-avatar{background:var(--queijo);color:var(--carvao-0);width:68px;height:68px;font-size:24px;}
.podium-2 .podium-avatar{background:#C9C0AE;color:var(--carvao-0);}
.podium-3 .podium-avatar{background:var(--brasa-escuro);color:#fff;}
.podium-name{font-weight:700;font-size:13px;}
.podium-pts{font-size:11px;color:var(--creme-fosco);margin-top:2px;}
.podium-bar{border-radius:10px 10px 0 0;margin-top:10px;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;}
.podium-1 .podium-bar{height:88px;background:linear-gradient(180deg,var(--queijo),var(--queijo-escuro));}
.podium-2 .podium-bar{height:64px;background:linear-gradient(180deg,#C9C0AE,#8f8776);}
.podium-3 .podium-bar{height:46px;background:linear-gradient(180deg,var(--brasa),var(--brasa-escuro));}
.podium-medal{font-family:'Archivo Black';color:rgba(0,0,0,.35);font-size:15px;}

.rank-row{
  display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--carvao-1);
  border:1px solid var(--borda);border-radius:13px;margin-bottom:8px;
}
.rank-pos{
  width:28px;height:28px;border-radius:8px;background:var(--carvao-2);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:var(--creme-fosco);flex-shrink:0;
}
.rank-info{flex:1;min-width:0;}
.rank-name{font-weight:700;font-size:14px;}
.rank-sub{font-size:11.5px;color:var(--creme-fosco);margin-top:2px;}
.rank-pts{text-align:right;flex-shrink:0;}
.rank-pts .n{font-family:'Archivo Black';font-size:16px;color:var(--queijo);}
.rank-pts .l{font-size:9.5px;color:var(--creme-fosco);text-transform:uppercase;}

/* ---------- FORMS / MODAL ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}
.modal-box{
  background:var(--carvao-1);border-radius:20px;border:1px solid var(--borda);padding:24px;
  max-width:440px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--sombra);
}
.modal-box h3{font-size:18px;margin-bottom:16px;}
.field-label{font-size:12px;font-weight:700;color:var(--creme-fosco);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;}
.field-label:first-child{margin-top:0;}
.field-input{
  width:100%;padding:12px 14px;border-radius:11px;background:var(--carvao-2);border:1.5px solid var(--borda);
  color:var(--creme);font-size:14.5px;outline:none;
}
.field-input:focus{border-color:var(--brasa);}
.field-row{display:flex;gap:10px;margin-top:20px;}
.field-row .btn{flex:1;}
.seg-control{display:flex;gap:6px;margin-top:6px;}
.seg-btn{flex:1;padding:10px;border-radius:10px;background:var(--carvao-2);border:1.5px solid var(--borda);font-size:13px;font-weight:700;color:var(--creme-fosco);}
.seg-btn.active{background:var(--brasa);border-color:var(--brasa);color:#fff;}

/* ---------- LISTS / TASK MANAGE ---------- */
.manage-task-row{
  display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--carvao-1);border:1px solid var(--borda);
  border-radius:12px;margin-bottom:8px;
}
.manage-task-name{flex:1;font-size:13.5px;font-weight:600;}
.manage-task-meta{font-size:11px;color:var(--creme-fosco);}
.icon-btn-sm{
  width:30px;height:30px;border-radius:9px;background:var(--carvao-2);border:1px solid var(--borda);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
}

/* ---------- FILTERS ---------- */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;}
.filter-bar select, .filter-bar input{
  padding:10px 12px;border-radius:10px;background:var(--carvao-1);border:1px solid var(--borda);color:var(--creme);
  font-size:12.5px;flex-shrink:0;min-width:120px;
}

/* ---------- HISTORY ---------- */
.hist-row{
  display:flex;align-items:center;gap:12px;padding:14px;background:var(--carvao-1);border:1px solid var(--borda);
  border-radius:13px;margin-bottom:8px;
}
.hist-status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hist-status-dot.completo{background:var(--alface);}
.hist-status-dot.pendente{background:var(--tomate);}
.hist-body{flex:1;min-width:0;}
.hist-title{font-weight:700;font-size:13.5px;}
.hist-sub{font-size:11.5px;color:var(--creme-fosco);margin-top:2px;}
.hist-pts{font-family:'Archivo Black';font-size:14px;color:var(--queijo);flex-shrink:0;}

/* ---------- TOAST / CONFETTI ---------- */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--carvao-1);
  border:1px solid var(--alface);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:10px;
  z-index:300;box-shadow:var(--sombra);font-weight:600;font-size:14px;animation:toastIn .3s ease;
}
@keyframes toastIn{from{transform:translate(-50%,20px);opacity:0;}to{transform:translate(-50%,0);opacity:1;}}
.celebrate-overlay{
  position:fixed;inset:0;background:rgba(20,17,16,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:400;padding:24px;text-align:center;
}
.celebrate-emoji{font-size:56px;margin-bottom:14px;}
.celebrate-overlay h2{font-size:24px;color:var(--queijo);margin-bottom:8px;}
.celebrate-overlay p{color:var(--creme-fosco);margin-bottom:24px;}
.celebrate-pts{font-family:'Archivo Black';font-size:44px;color:var(--alface);margin-bottom:6px;}

/* ---------- BOTTOM NAV ---------- */
.bottom-nav{
  position:sticky;bottom:0;background:var(--carvao-1);border-top:1px solid var(--borda);
  display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:50;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:10px;
  color:var(--creme-fosco);font-size:10px;font-weight:600;
}
.nav-item.active{color:var(--brasa);}
.nav-icon{font-size:19px;}

.empty-state{text-align:center;padding:50px 20px;color:var(--creme-fosco);}
.empty-state .ic{font-size:38px;margin-bottom:12px;}

.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-dot.on{background:var(--alface);box-shadow:0 0 0 3px rgba(76,154,42,.18);}
.sync-dot.off{background:var(--tomate);}
.sync-dot.loading{background:var(--queijo);animation:pulseDot 1s infinite;}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.35;}}
.sync-label{font-size:10px;color:var(--creme-fosco);}

.boot-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.boot-screen .brand-mark{width:56px;height:56px;font-size:26px;border-radius:14px;margin-bottom:16px;}
.boot-screen p{color:var(--creme-fosco);font-size:13px;margin-top:10px;}
.boot-spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--carvao-3);border-top-color:var(--brasa);animation:spin .8s linear infinite;margin-top:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

.setup-banner{
  background:rgba(194,59,59,.1);border:1px solid var(--tomate);border-radius:14px;padding:14px 16px;margin-bottom:16px;
}
.setup-banner b{color:var(--tomate);}
.setup-banner p{font-size:12.5px;color:var(--creme-fosco);margin-top:4px;line-height:1.5;}

.chart-wrap{background:var(--carvao-1);border:1px solid var(--borda);border-radius:16px;padding:16px;margin-bottom:14px;height:260px;position:relative;}
.chart-wrap h3{font-size:13px;margin-bottom:10px;color:var(--creme-fosco);text-transform:uppercase;letter-spacing:.5px;}

.search-box{
  display:flex;align-items:center;gap:10px;background:var(--carvao-1);border:1px solid var(--borda);
  border-radius:12px;padding:11px 14px;margin-bottom:16px;
}
.search-box input{flex:1;background:transparent;border:none;color:var(--creme);font-size:14px;outline:none;}

<script>
/* =========================================================
   DOM CELLEBRE BURGER — SISTEMA DE CHECKLIST
   Persistência via localStorage (chave: dcb_state_v1)
   ========================================================= */

const STORAGE_KEY = 'dcb_state_v1';

/* =========================================================
   CONFIGURAÇÃO FIREBASE — sincronização entre celulares
   =========================================================
   Cole aqui o objeto "firebaseConfig" que o Firebase te dá
   ao criar seu projeto (veja o passo a passo que te enviei).
   Enquanto estiver vazio, o sistema funciona normalmente,
   mas cada aparelho fica com dados separados (sem sincronizar).
   ========================================================= */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCaFJ8OXjFp8B4TQ39dc_kbkqWCfeZ0p_o",
  authDomain: "dom-cellebre-burger-checklist.firebaseapp.com",
  projectId: "dom-cellebre-burger-checklist",
  storageBucket: "dom-cellebre-burger-checklist.firebasestorage.app",
  messagingSenderId: "326998674677",
  appId: "1:326998674677:web:a91ca4cf7bbca64329c9bc",
};
const FIREBASE_ATIVO = !!FIREBASE_CONFIG.apiKey;
let db = null;
let syncStatus = FIREBASE_ATIVO ? 'loading' : 'off'; // loading | on | off | error
let bootDone = !FIREBASE_ATIVO; // sem firebase, já pode renderizar direto

const USERS = [
  {id:'joao', nome:'João', role:'admin'},
  {id:'giulia', nome:'Giulia', role:'admin'},
  {id:'will', nome:'Will', role:'colab'},
  {id:'renata', nome:'Renata', role:'colab'},
  {id:'edy', nome:'Edy', role:'colab'},
  {id:'havy', nome:'Havy', role:'colab'},
  {id:'nayane', nome:'Nayane', role:'colab'},
];
const SENHA_PADRAO = 'Burger';

const UNIDADES_PADRAO = ['Moda Center', 'Food Park'];
const SETORES = ['Cozinha', 'Caixa'];
const TIPOS = ['Abertura', 'Fechamento'];

function initials(nome){ return nome.slice(0,2).toUpperCase(); }
function uid(){ return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function nowISO(){ return new Date().toISOString(); }
function fmtTime(iso){ if(!iso) return '--:--'; const d=new Date(iso); return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso){ if(!iso) return '--'; const d=new Date(iso); return d.toLocaleDateString('pt-BR'); }
function fmtDateTime(iso){ return fmtDate(iso)+' às '+fmtTime(iso); }
function todayKey(){ return new Date().toISOString().slice(0,10); }

/* ---------- TEMPLATES PADRÃO DE CHECKLIST ---------- */
function defaultTemplates(){
  return {
    'Cozinha|Abertura': [
      {nome:'Higienizar bancadas e utensílios', pontos:10, obrigatoria:true},

    ],
    'Cozinha|Fechamento': [
      {nome:'Desligar chapa e equipamentos', pontos:5, obrigatoria:true},

      {nome:'Limpar bancadas e pisos', pontos:10, obrigatoria:true},
      {nome:'Retirar lixo da cozinha', pontos:5, obrigatoria:true},
      {nome:'Conferir fechamento de geladeiras', pontos:10, obrigatoria:true},
    ],
    'Caixa|Abertura': [
      {nome:'Conferir fundo de caixa', pontos:20, obrigatoria:true},
      {nome:'Ligar sistema de vendas / maquininha', pontos:5, obrigatoria:true},
      {nome:'Testar impressora de cupom', pontos:5, obrigatoria:true},
      {nome:'Organizar cardápios e mesas', pontos:5, obrigatoria:false},
      {nome:'Conferir troco disponível', pontos:10, obrigatoria:true},
    ],
    'Caixa|Fechamento': [
      {nome:'Conferir fechamento de caixa', pontos:20, obrigatoria:true},
      {nome:'Emitir relatório de vendas do dia', pontos:10, obrigatoria:true},
      {nome:'Guardar dinheiro no cofre', pontos:20, obrigatoria:true},
      {nome:'Desligar sistema e maquininha', pontos:5, obrigatoria:true},
      {nome:'Organizar área do caixa', pontos:5, obrigatoria:false},
    ],
  };
}

function defaultState(){
  return {
    unidades: [...UNIDADES_PADRAO],
    templates: defaultTemplates(),
    checklists: [], // instâncias: {id, unidade, setor, tipo, dataKey, tarefas:[{...tpl, id, feita, horaFeita, colaborador, atrasada}], abertoPor, abertoEm, finalizadoPor, finalizadoEm, status, pontosTotais}
    resetHistorico: [], // registros de reset mensal
  };
}

function mergeWithDefaults(parsed){
  const base = defaultState();
  if(!parsed) return base;
  return {...base, ...parsed, templates: parsed.templates || base.templates, unidades: parsed.unidades || base.unidades, checklists: parsed.checklists || [], resetHistorico: parsed.resetHistorico || []};
}

function loadStateLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){ const s = defaultState(); localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); return s; }
    return mergeWithDefaults(JSON.parse(raw));
  }catch(e){
    console.error('Erro ao carregar estado local', e);
    return defaultState();
  }
}

function saveState(s){
  state = s;
  if(FIREBASE_ATIVO && db){
    db.collection('dcb').doc('estado').set(s).catch(e=>{
      console.error('Erro ao salvar na nuvem', e);
      syncStatus = 'error';
    });
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  }
}

function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    const docRef = db.collection('dcb').doc('estado');
    docRef.onSnapshot(snap=>{
      if(snap.exists){
        state = mergeWithDefaults(snap.data());
      } else {
        state = defaultState();
        docRef.set(state);
      }
      syncStatus = 'on';
      bootDone = true;
      render();
    }, err=>{
      console.error('Erro de sincronização', err);
      syncStatus = 'error';
      if(!bootDone){ state = loadStateLocal(); bootDone = true; }
      render();
    });
  }catch(e){
    console.error('Falha ao iniciar Firebase', e);
    syncStatus = 'error';
    state = loadStateLocal();
    bootDone = true;
    render();
  }
}

let state = FIREBASE_ATIVO ? defaultState() : loadStateLocal();
let session = { userId: null }; // sessão não persiste entre fechamentos de app por segurança simples
let currentSetup = { unidade:null, setor:null, tipo:null };
let currentChecklistId = null;
let currentTab = 'checklist'; // checklist | ranking | dashboard | historico | stats | config
let toastMsg = null;
let modal = null; // {type, payload}

const app = document.getElementById('app');

function currentUser(){ return USERS.find(u=>u.id===session.userId) || null; }
function isAdmin(){ const u=currentUser(); return u && u.role==='admin'; }

function render(){
  if(!bootDone){ renderBootScreen(); return; }
  if(!session.userId){ renderLogin(); return; }
  if(!currentSetup.unidade || !currentSetup.setor || !currentSetup.tipo){
    // admins podem pular direto pro dashboard/config via nav; mas fluxo padrão pede setup
    renderShell(renderSetupFlow());
    return;
  }
  renderShell(renderMain());
}

function renderBootScreen(){
  app.innerHTML = `
    <div class="boot-screen">
      <div class="brand-mark">D</div>
      <div style="font-family:'Archivo Black';font-size:16px;">Dom Cellebre Burger</div>
      <div class="boot-spinner"></div>
      <p>Conectando aos dados da equipe...</p>
    </div>
  `;
}

function renderShell(innerHTML){
  const u = currentUser();
  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">D</div>
        <div class="brand-text">
          <div class="t1">Dom Cellebre Burger</div>
          <div class="t2" style="display:flex;align-items:center;gap:5px;">
            <span class="sync-dot ${syncStatus==='on'?'on':syncStatus==='loading'?'loading':'off'}"></span>
            <span class="sync-label" style="text-transform:none;letter-spacing:0;">${syncStatus==='on'?'sincronizado':syncStatus==='loading'?'conectando':FIREBASE_ATIVO?'sem conexão':'sem sincronização'}</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="user-chip">
          <b>${u.nome}</b>
          <span class="badge-role ${u.role==='admin'?'badge-admin':'badge-colab'}">${u.role==='admin'?'admin':'equipe'}</span>
        </div>
        <button class="btn-icon" onclick="handleLogout()" title="Sair">⏻</button>
      </div>
    </div>
    ${!FIREBASE_ATIVO && u.role==='admin' ? `
    <div class="container" style="padding-bottom:0;">
      <div class="setup-banner">
        <b>Sincronização entre celulares desativada.</b>
        <p>Os dados deste aparelho não estão sendo compartilhados com a equipe. Configure o Firebase no arquivo do sistema para que todos vejam os mesmos checklists em tempo real.</p>
      </div>
    </div>` : ''}
    <div class="container" style="padding-bottom:6px;">${innerHTML}</div>
    ${renderBottomNav()}
    ${toastMsg ? renderToast() : ''}
    ${modal ? renderModal() : ''}
  `;
  afterRenderHooks();
}

function renderBottomNav(){
  const admin = isAdmin();
  const items = [
    {id:'checklist', ic:'✓', label:'Checklist'},
    {id:'ranking', ic:'🏆', label:'Ranking'},
    {id:'historico', ic:'🕐', label:'Histórico'},
  ];
  if(admin){
    items.push({id:'dashboard', ic:'📊', label:'Painel'});
    items.push({id:'config', ic:'⚙', label:'Config'});
  }
  return `<div class="bottom-nav">
    ${items.map(it=>`
      <button class="nav-item ${currentTab===it.id?'active':''}" onclick="goTab('${it.id}')">
        <span class="nav-icon">${it.ic}</span>
        <span>${it.label}</span>
      </button>
    `).join('')}
  </div>`;
}

function goTab(tab){
  currentTab = tab;
  if(tab==='checklist' && (!currentSetup.unidade || !currentSetup.setor || !currentSetup.tipo)){
    // fica no setup flow
  }
  render();
}

/* ================= LOGIN ================= */
let loginSelectedUser = null;
let loginPassword = '';
let loginError = '';

function renderLogin(){
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-hero">
        <div class="brand-mark">D</div>
        <h1>Dom Cellebre<br>Burger</h1>
        <p>Sistema de checklist da equipe</p>
      </div>
      <div class="login-card">
        <div class="login-section-label">Administradores</div>
        <div class="user-grid">
          ${USERS.filter(u=>u.role==='admin').map(u=>`
            <button class="user-btn ${loginSelectedUser===u.id?'selected':''}" onclick="selectLoginUser('${u.id}')">${u.nome}</button>
          `).join('')}
        </div>
        <div class="login-section-label">Equipe</div>
        <div class="user-grid">
          ${USERS.filter(u=>u.role==='colab').map(u=>`
            <button class="user-btn ${loginSelectedUser===u.id?'selected':''}" onclick="selectLoginUser('${u.id}')">${u.nome}</button>
          `).join('')}
        </div>
        <input type="password" class="pass-field" placeholder="Senha" id="pass-input"
          value="${loginPassword}" oninput="loginPassword=this.value" onkeydown="if(event.key==='Enter') handleLogin()">
        ${loginError ? `<div class="login-error">${loginError}</div>` : ''}
        <button class="btn btn-primary btn-block" style="margin-top:18px;" onclick="handleLogin()">Entrar</button>
      </div>
    </div>
  `;
  const pi = document.getElementById('pass-input');
  if(pi) pi.focus();
}
function selectLoginUser(id){ loginSelectedUser = id; loginError=''; render(); }
function handleLogin(){
  if(!loginSelectedUser){ loginError='Selecione seu nome.'; render(); return; }
  if(loginPassword !== SENHA_PADRAO){ loginError='Senha incorreta.'; render(); return; }
  session.userId = loginSelectedUser;
  loginSelectedUser=null; loginPassword=''; loginError='';
  currentTab = isAdmin() ? 'checklist' : 'checklist';
  currentSetup = {unidade:null,setor:null,tipo:null};
  render();
}
function handleLogout(){
  session.userId = null;
  currentSetup = {unidade:null,setor:null,tipo:null};
  currentChecklistId = null;
  render();
}

/* ================= SETUP FLOW ================= */
function renderSetupFlow(){
  const step = !currentSetup.unidade ? 1 : !currentSetup.setor ? 2 : 3;
  const icons = {unidade:{'Moda Center':'🏬','Food Park':'🌳'}, setor:{'Cozinha':'🍳','Caixa':'💵'}, tipo:{'Abertura':'🌅','Fechamento':'🌙'}};

  let title, sub, options, onPick;
  if(step===1){
    title='Escolha a unidade'; sub='Onde você vai trabalhar agora?';
    options = state.unidades.map(un=>({key:un, ic:icons.unidade[un]||'📍', sub:'Unidade'}));
    onPick = (v)=>{ currentSetup.unidade=v; render(); };
  } else if(step===2){
    title='Escolha o setor'; sub=currentSetup.unidade;
    options = SETORES.map(s=>({key:s, ic:icons.setor[s], sub:'Setor'}));
    onPick = (v)=>{ currentSetup.setor=v; render(); };
  } else {
    title='Abertura ou fechamento?'; sub=`${currentSetup.unidade} · ${currentSetup.setor}`;
    options = TIPOS.map(t=>({key:t, ic:icons.tipo[t], sub:t==='Abertura'?'Início do turno':'Fim do turno'}));
    onPick = (v)=>{ currentSetup.tipo=v; openOrCreateChecklist(); };
  }

  return `
    <div class="setup-wrap">
      <div class="step-dots">
        ${[1,2,3].map(n=>`<div class="step-dot ${n<step?'done':n===step?'active':''}"></div>`).join('')}
      </div>
      <div class="setup-title">${title}</div>
      <div class="setup-sub">${sub}</div>
      ${options.map(o=>`
        <button class="option-card" onclick="setupPick_${step}('${o.key.replace(/'/g,"\\'")}')" style="width:100%;text-align:left;">
          <div class="option-icon">${o.ic}</div>
          <div>
            <div class="option-title">${o.key}</div>
            <div class="option-sub">${o.sub}</div>
          </div>
        </button>
      `).join('')}
      ${step>1 ? `<button class="btn btn-ghost btn-block" style="margin-top:10px;" onclick="setupBack(${step})">← Voltar</button>` : ''}
    </div>
  `;
}
window.setupPick_1 = (v)=>{ currentSetup.unidade=v; render(); };
window.setupPick_2 = (v)=>{ currentSetup.setor=v; render(); };
window.setupPick_3 = (v)=>{ currentSetup.tipo=v; openOrCreateChecklist(); };
function setupBack(step){
  if(step===2) currentSetup.unidade=null;
  if(step===3) currentSetup.setor=null;
  render();
}

function openOrCreateChecklist(){
  const {unidade,setor,tipo} = currentSetup;
  const dk = todayKey();
  let existing = state.checklists.find(c=>c.unidade===unidade&&c.setor===setor&&c.tipo===tipo&&c.dataKey===dk);
  if(!existing){
    const tplKey = `${setor}|${tipo}`;
    const tpl = state.templates[tplKey] || [];
    existing = {
      id: uid(), unidade, setor, tipo, dataKey: dk,
      tarefas: tpl.map(t=>({id:uid(), nome:t.nome, pontos:t.pontos, obrigatoria:t.obrigatoria, feita:false, horaFeita:null, colaborador:null, atrasada:false})),
      abertoPor: currentUser().nome, abertoEm: nowISO(),
      finalizadoPor:null, finalizadoEm:null,
      status:'pendente', pontosTotais:0,
    };
    state.checklists.push(existing);
    saveState(state);
  }
  currentChecklistId = existing.id;
  currentTab='checklist';
  render();
}

/* ================= MAIN ROUTER ================= */
function renderMain(){
  if(currentTab==='checklist') return renderChecklistView();
  if(currentTab==='ranking') return renderRankingView();
  if(currentTab==='historico') return renderHistoricoView();
  if(currentTab==='dashboard' && isAdmin()) return renderDashboardView();
  if(currentTab==='config' && isAdmin()) return renderConfigView();
  return renderChecklistView();
}

/* ================= CHECKLIST VIEW ================= */
function getChecklist(id){ return state.checklists.find(c=>c.id===id); }

function renderChecklistView(){
  if(!currentChecklistId){
    return `<div style="padding-top:10px;">
      <button class="btn btn-secondary btn-block" onclick="currentSetup={unidade:null,setor:null,tipo:null};render();">Escolher unidade / setor / turno</button>
      ${renderQuickTodayList()}
    </div>`;
  }
  const cl = getChecklist(currentChecklistId);
  if(!cl){ currentChecklistId=null; return renderChecklistView(); }

  const total = cl.tarefas.length;
  const feitas = cl.tarefas.filter(t=>t.feita).length;
  const pct = total? Math.round((feitas/total)*100) : 0;
  const obrigTotal = cl.tarefas.filter(t=>t.obrigatoria).length;
  const obrigFeitas = cl.tarefas.filter(t=>t.obrigatoria&&t.feita).length;
  const podeFinalizar = obrigFeitas===obrigTotal && total>0 && cl.status!=='completo';

  return `
    <div class="checklist-header">
      <div class="comanda-tag">📋 Comanda #${cl.id.slice(-5).toUpperCase()}</div>
      <h2>${cl.setor} · ${cl.tipo}</h2>
      <div class="checklist-meta">
        <span>🏬 ${cl.unidade}</span>
        <span>📅 ${fmtDate(cl.abertoEm)}</span>
        <span>👤 Aberto por ${cl.abertoPor}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label"><span><b>${feitas}/${total}</b> tarefas concluídas</span><span><b>${pct}%</b></span></div>
    </div>

    ${cl.status==='completo' ? `
      <div class="card" style="border-color:var(--alface);background:rgba(76,154,42,.08);">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;">✅</span>
          <div>
            <div style="font-weight:700;">Checklist finalizado</div>
            <div style="font-size:12px;color:var(--creme-fosco);">por ${cl.finalizadoPor} às ${fmtTime(cl.finalizadoEm)} · ${cl.pontosTotais} pts</div>
          </div>
        </div>
      </div>
    ` : ''}

    ${cl.tarefas.map(t=>renderTaskItem(cl, t)).join('')}

    ${cl.status!=='completo' ? `
      <div class="fab-finish">
        <button class="btn btn-primary btn-block" ${podeFinalizar?'':'disabled'} onclick="askFinalize()">
          ${podeFinalizar ? '🎉 Finalizar checklist' : `Complete as tarefas obrigatórias (${obrigFeitas}/${obrigTotal})`}
        </button>
      </div>
    ` : `
      <button class="btn btn-secondary btn-block" style="margin-top:12px;" onclick="currentChecklistId=null;render();">Ver outra comanda</button>
    `}
  `;
}

function renderQuickTodayList(){
  const dk = todayKey();
  const todays = state.checklists.filter(c=>c.dataKey===dk);
  if(todays.length===0) return `<div class="empty-state"><div class="ic">🍔</div>Nenhuma comanda aberta hoje ainda.</div>`;
  return `
    <div class="section-title"><span>Comandas de hoje</span><div class="line"></div></div>
    ${todays.map(c=>{
      const feitas=c.tarefas.filter(t=>t.feita).length;
      return `
      <div class="hist-row" onclick="currentChecklistId='${c.id}';render();" style="cursor:pointer;">
        <div class="hist-status-dot ${c.status==='completo'?'completo':'pendente'}"></div>
        <div class="hist-body">
          <div class="hist-title">${c.unidade} · ${c.setor} · ${c.tipo}</div>
          <div class="hist-sub">${feitas}/${c.tarefas.length} tarefas · ${c.status==='completo'?'Finalizado':'Em andamento'}</div>
        </div>
        <div class="hist-pts">${c.pontosTotais||0}</div>
      </div>`;
    }).join('')}
  `;
}

function renderTaskItem(cl, t){
  return `
    <div class="task-item ${t.feita?'done':''}">
      <button class="task-check" onclick="toggleTask('${cl.id}','${t.id}')" ${cl.status==='completo'?'disabled':''}>${t.feita?'✓':''}</button>
      <div class="task-body">
        <div class="task-name">${t.nome}${t.obrigatoria?'<span class="task-req">obrigatória</span>':''}</div>
        <span class="task-pts">+${t.pontos} pts${t.atrasada?' (atrasada, /2)':''}</span>
        ${t.feita ? `<div class="task-done-info ${t.atrasada?'task-late':''}">
          <span>👤 ${t.colaborador}</span><span>🕐 ${fmtTime(t.horaFeita)}</span><span>📅 ${fmtDate(t.horaFeita)}</span>
        </div>` : ''}
        ${isAdmin() ? `<div class="task-admin-actions">
          <button class="icon-btn-sm" onclick="event.stopPropagation();openTaskEditModal('${cl.id}','${t.id}')" title="Editar tarefa">✎</button>
          <button class="icon-btn-sm" onclick="event.stopPropagation();removeTaskFromChecklist('${cl.id}','${t.id}')" title="Remover">🗑</button>
        </div>` : ''}
      </div>
    </div>
  `;
}

function toggleTask(clId, taskId){
  const cl = getChecklist(clId);
  const t = cl.tarefas.find(x=>x.id===taskId);
  if(!t || cl.status==='completo') return;
  if(t.feita){
    t.feita=false; t.horaFeita=null; t.colaborador=null; t.atrasada=false;
  } else {
    t.feita=true; t.horaFeita=nowISO(); t.colaborador=currentUser().nome;
    // regra de atraso: se abertura marcada após 11h ou fechamento após 23h59 (heurística simples configurável)
    const hour = new Date().getHours();
    t.atrasada = (cl.tipo==='Abertura' && hour>=11) || (cl.tipo==='Fechamento' && hour>=24);
  }
  saveState(state);
  render();
}

function askFinalize(){
  modal = {type:'confirm-finalize', payload:{clId:currentChecklistId}};
  render();
}
function doFinalize(){
  const cl = getChecklist(currentChecklistId);
  let pts = 0;
  cl.tarefas.forEach(t=>{
    if(t.feita) pts += t.atrasada ? Math.round(t.pontos/2) : t.pontos;
  });
  pts += 30; // bônus checklist completo
  cl.pontosTotais = pts;
  cl.status='completo';
  cl.finalizadoPor = currentUser().nome;
  cl.finalizadoEm = nowISO();
  saveState(state);
  modal=null;
  showToast('Checklist salvo no histórico');
  showCelebration(pts);
}

  const overlay = document.createElement('div');
  overlay.className='celebrate-overlay';
  overlay.innerHTML = `
    <div class="celebrate-emoji">🎉🍔🎉</div>

    <div class="celebrate-pts">+${pts}</div>
    <p>pontos conquistados</p>
    <button class="btn btn-primary" onclick="this.closest('.celebrate-overlay').remove(); render();">Show de bola!</button>

}

/* ================= RANKING ================= */
function computeRanking(monthKey){
  const mk = monthKey || todayKey().slice(0,7);
  const byUser = {};
  USERS.filter(u=>u.role==='colab' || true).forEach(u=>{ byUser[u.nome] = {nome:u.nome, checklists:0, tarefas:0, pontos:0, ultima:null}; });
  state.checklists.forEach(cl=>{
    if(!cl.dataKey.startsWith(mk)) return;
    cl.tarefas.forEach(t=>{
      if(t.feita && t.colaborador){
        if(!byUser[t.colaborador]) byUser[t.colaborador]={nome:t.colaborador,checklists:0,tarefas:0,pontos:0,ultima:null};
        byUser[t.colaborador].tarefas += 1;
        byUser[t.colaborador].pontos += t.atrasada? Math.round(t.pontos/2): t.pontos;
        if(!byUser[t.colaborador].ultima || t.horaFeita>byUser[t.colaborador].ultima) byUser[t.colaborador].ultima=t.horaFeita;
      }
    });
    if(cl.status==='completo' && cl.finalizadoPor){
      if(!byUser[cl.finalizadoPor]) byUser[cl.finalizadoPor]={nome:cl.finalizadoPor,checklists:0,tarefas:0,pontos:0,ultima:null};
      byUser[cl.finalizadoPor].checklists += 1;
      byUser[cl.finalizadoPor].pontos += 30;
    }
  });
  const arr = Object.values(byUser).filter(u=>u.pontos>0 || u.checklists>0 || u.tarefas>0);
  arr.sort((a,b)=>b.pontos-a.pontos);
  return arr;
}

function drawDashboardCharts(){
  statsCharts.forEach(c=>c.destroy());
  statsCharts = [];
  const gridColor = 'rgba(244,238,226,.08)';
  const textColor = '#C9C0AE';
  Chart.defaults.color = textColor;
  Chart.defaults.font.family = 'Inter';

  const mk = todayKey().slice(0,7);
  const ranking = computeRanking(mk);

  const c1 = document.getElementById('chartProdutividade');
  if(c1) statsCharts.push(new Chart(c1, {
    type:'bar',
    data:{ labels: ranking.map(r=>r.nome), datasets:[{label:'Pontos', data:ranking.map(r=>r.pontos), backgroundColor:'#D9531E', borderRadius:6}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}},y:{grid:{color:gridColor}}} }
  }));

  const all = state.checklists.filter(c=>!c.dataKey.startsWith('arq-'));
  const porUnidade = {};
  state.unidades.forEach(u=>porUnidade[u]=0);
  all.forEach(c=>{ porUnidade[c.unidade]=(porUnidade[c.unidade]||0)+1; });
  const c2 = document.getElementById('chartUnidade');
  if(c2) statsCharts.push(new Chart(c2, {
    type:'doughnut',
    data:{ labels:Object.keys(porUnidade), datasets:[{data:Object.values(porUnidade), backgroundColor:['#D9531E','#F2A93C','#4C9A2A','#3D7FBF']}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
  }));

  const porSetor = {Cozinha:0, Caixa:0};
  all.forEach(c=>{ porSetor[c.setor]=(porSetor[c.setor]||0)+1; });
  const c3 = document.getElementById('chartSetor');
  if(c3) statsCharts.push(new Chart(c3, {
    type:'doughnut',
    data:{ labels:Object.keys(porSetor), datasets:[{data:Object.values(porSetor), backgroundColor:['#F2A93C','#3D7FBF']}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
  }));

  // evolução semanal (últimas 8 semanas) pontos totais
  const weekMap = {};
  all.forEach(c=>{
    if(c.status!=='completo') return;
    const d = new Date(c.finalizadoEm || c.abertoEm);
    const weekStart = new Date(d); weekStart.setDate(d.getDate()-d.getDay());
    const wk = weekStart.toISOString().slice(0,10);
    weekMap[wk] = (weekMap[wk]||0) + (c.pontosTotais||0);
  });
  const weeks = Object.keys(weekMap).sort().slice(-8);
  const c4 = document.getElementById('chartSemana');
  if(c4) statsCharts.push(new Chart(c4, {
    type:'line',
    data:{ labels: weeks.map(w=>fmtDate(w)), datasets:[{label:'Pontos', data: weeks.map(w=>weekMap[w]), borderColor:'#4C9A2A', backgroundColor:'rgba(76,154,42,.15)', fill:true, tension:.3}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}},y:{grid:{color:gridColor}}} }
  }));
}

  const naoFeitas = cl.tarefas.filter(t=>!t.feita);
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>Finalizar checklist?</h3>
      <div style="font-size:13px;color:var(--creme-fosco);margin-bottom:8px;">Confira antes de finalizar. Essa ação não pode ser desfeita.</div>
      <div class="confirm-check-list">
        ${feitas.map(t=>`<div class="confirm-check-item">✅ ${t.nome}</div>`).join('')}
        ${naoFeitas.map(t=>`<div class="confirm-check-item">◻ ${t.nome} <span style="color:var(--creme-fosco);">(opcional)</span></div>`).join('')}
      </div>
      <div class="field-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="doFinalize()">Confirmar</button>
      </div>
    </div>
  </div>`;
}

function renderModalConfirmReset(){
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>Resetar ranking mensal?</h3>
      <div style="font-size:13px;color:var(--creme-fosco);">Os dados deste mês serão arquivados e o ranking começará do zero. O histórico continua acessível pelos filtros.</div>
      <div class="field-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-danger" onclick="doResetRanking()">Resetar</button>
      </div>
    </div>
  </div>`;
}

function renderModalAddUnidade(){
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>Nova unidade</h3>
      <div class="field-label">Nome da unidade</div>
      <input class="field-input" id="new-unidade-nome" placeholder="Ex: Shopping Central">
      <div class="field-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmAddUnidade()">Adicionar</button>
      </div>
    </div>
  </div>`;
}
function confirmAddUnidade(){
  const v = document.getElementById('new-unidade-nome').value.trim();
  if(!v) return;
  state.unidades.push(v);
  saveState(state);
  closeModal();
}

function renderModalTemplateTask(){
  const {key, editing, task} = modal.payload;
  const nome = task?.nome || '';
  const pontos = task?.pontos || 10;
  const obrig = task ? task.obrigatoria : true;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>${editing?'Editar tarefa':'Nova tarefa'}</h3>
      <div class="field-label">Nome da tarefa</div>
      <input class="field-input" id="tt-nome" value="${nome.replace(/"/g,'&quot;')}" placeholder="Ex: Higienizar bancadas">
      <div class="field-label">Pontuação</div>
      <input class="field-input" id="tt-pontos" type="number" value="${pontos}" min="1">
      <div class="field-label">Obrigatória?</div>
      <div class="seg-control">
        <button class="seg-btn ${obrig?'active':''}" onclick="document.getElementById('tt-obrig').value='true';this.classList.add('active');this.nextElementSibling.classList.remove('active');">Sim</button>
        <button class="seg-btn ${!obrig?'active':''}" onclick="document.getElementById('tt-obrig').value='false';this.classList.add('active');this.previousElementSibling.classList.remove('active');">Não</button>
      </div>
      <input type="hidden" id="tt-obrig" value="${obrig}">
      <div class="field-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmTemplateTask()">Salvar</button>
      </div>
    </div>
  </div>`;
}
function confirmTemplateTask(){
  const {key, editing, idx} = modal.payload;
  const nome = document.getElementById('tt-nome').value.trim();
  const pontos = parseInt(document.getElementById('tt-pontos').value) || 10;
  const obrig = document.getElementById('tt-obrig').value === 'true';
  if(!nome) return;
  if(!state.templates[key]) state.templates[key]=[];
  if(editing){ state.templates[key][idx] = {nome, pontos, obrigatoria:obrig}; }
  else { state.templates[key].push({nome, pontos, obrigatoria:obrig}); }
  saveState(state);
  closeModal();
}

function renderModalEditActiveTask(){
  const {clId, taskId, nome, pontos, obrigatoria} = modal.payload;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>Editar tarefa</h3>
      <div class="field-label">Nome</div>
      <input class="field-input" id="et-nome" value="${nome.replace(/"/g,'&quot;')}">
      <div class="field-label">Pontuação</div>
      <input class="field-input" id="et-pontos" type="number" value="${pontos}" min="1">
      <div class="field-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmEditActiveTask()">Salvar</button>
      </div>
    </div>
  </div>`;
}
function confirmEditActiveTask(){
  const {clId, taskId} = modal.payload;
  const cl = getChecklist(clId);
  const t = cl.tarefas.find(x=>x.id===taskId);
  t.nome = document.getElementById('et-nome').value.trim() || t.nome;
  t.pontos = parseInt(document.getElementById('et-pontos').value) || t.pontos;
  saveState(state);
  closeModal();
}

/* ================= TOAST ================= */
function showToast(msg){
  toastMsg = msg;
  render();
  setTimeout(()=>{ toastMsg=null; render(); }, 2600);
}
function renderToast(){
  return `<div class="toast">✅ ${toastMsg}</div>`;
}

/* ================= HOOKS PÓS-RENDER ================= */
function afterRenderHooks(){
  if(currentTab==='dashboard' && isAdmin()){
    setTimeout(drawDashboardCharts, 30);
  }
}

/* ================= INIT ================= */
if(FIREBASE_ATIVO){
  initFirebase();
  render(); // mostra tela de conexão enquanto aguarda o primeiro snapshot
} else {
  render();
}
</script>
