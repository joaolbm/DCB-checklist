  if(temOverride && temRecorrencia){
    botaoAcao = `<button class="btn btn-danger" onclick="confirmarRemoverEscala()">↺ Reverter p/ recorrência</button>`;
  } else if(temOverride && !temRecorrencia){
    botaoAcao = `<button class="btn btn-danger" onclick="confirmarRemoverEscala()">Remover</button>`;
  } else if(!temOverride && temRecorrencia){
    botaoAcao = `<button class="btn btn-danger" onclick="confirmarCancelarOcorrencia()">Cancelar este dia</button>`;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>${user.nome} · ${fmtDateOnly(dataKey)}</h3>
      ${temRecorrencia ? `<div style="font-size:11px;color:var(--amarelo);font-weight:700;margin-bottom:10px;">🔁 Este dia vem de um horário recorrente${temOverride?' (com edição individual aplicada)':''}</div>` : ''}
      <div class="field-label">Tipo</div>
      <div class="seg-control" style="flex-wrap:wrap;">
        ${TIPOS_ESCALA.map(t=>`<button class="seg-btn ${draftTipo===t.key?'active':''}" style="flex:1 1 45%;" onclick="selecionarTipoEscala('${t.key}')">${t.emoji} ${t.label}</button>`).join('')}
      </div>
      <div class="field-label">Entrada</div>
      <input class="field-input" type="time" id="esc-entrada" value="${entry?.entrada||''}">
      <div class="field-label">Saída</div>
      <input class="field-input" type="time" id="esc-saida" value="${entry?.saida||''}">
      <div class="field-label">Unidade</div>
      <select class="field-input" id="esc-unidade">
        <option value="">—</option>
        ${state.unidades.map(u=>`<option value="${u}" ${entry?.unidade===u?'selected':''}>${u}</option>`).join('')}
      </select>
      <div class="field-label">Observações</div>
      <input class="field-input" id="esc-obs" value="${(entry?.observacoes||'').replace(/"/g,'&quot;')}" placeholder="Opcional">
      <div class="field-row">
        ${botaoAcao}
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarSalvarEscala()">Salvar${temRecorrencia && !temOverride ? ' só este dia' : ''}</button>
      </div>
    </div>
  </div>`;
}

function renderModalNovaRecorrencia(){
  const p = modal.payload;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>${p.editing?'Editar':'Nova'} escala recorrente</h3>
      <div class="field-label">Colaborador${p.editing?'':'(es)'}</div>
      ${p.editing ? `
        <div style="font-weight:700;font-size:14px;padding:10px 0;">${USERS.find(u=>u.id===p.userIds[0])?.nome || ''}</div>
      ` : `
        <div class="seg-control" style="flex-wrap:wrap;">
          ${USERS.map(u=>`<button class="seg-btn ${p.userIds.includes(u.id)?'active':''}" style="flex:1 1 45%;" onclick="toggleColaboradorRecorrencia('${u.id}')">${u.nome}</button>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--cinza-claro);margin-top:6px;">Toque em quantos colaboradores quiser — a mesma escala será criada para todos.</div>
      `}
      <div class="field-label">Dias da semana</div>
      <div class="seg-control" style="flex-wrap:wrap;">
        ${DIAS_SEMANA_LABEL.map((label,idx)=>`
          <button class="seg-btn ${p.diasSemana.includes(idx)?'active':''}" style="flex:1 1 30%;" onclick="toggleDiaSemanaRecorrencia(${idx})">${label}</button>
        `).join('')}
      </div>
      <div class="field-label">Tipo</div>
      <select class="field-input" onchange="modal.payload.tipo=this.value">
        ${TIPOS_ESCALA.map(t=>`<option value="${t.key}" ${p.tipo===t.key?'selected':''}>${t.emoji} ${t.label}</option>`).join('')}
      </select>
      <div class="field-label">Entrada</div>
      <input class="field-input" type="time" value="${p.entrada}" oninput="modal.payload.entrada=this.value">
      <div class="field-label">Saída</div>
      <input class="field-input" type="time" value="${p.saida}" oninput="modal.payload.saida=this.value">
      <div class="field-label">Unidade</div>
      <select class="field-input" onchange="modal.payload.unidade=this.value">
        <option value="">—</option>
        ${state.unidades.map(u=>`<option value="${u}" ${p.unidade===u?'selected':''}>${u}</option>`).join('')}
      </select>
      <div class="field-label">Observações</div>
      <input class="field-input" value="${(p.observacoes||'').replace(/"/g,'&quot;')}" oninput="modal.payload.observacoes=this.value" placeholder="Opcional">
      <div class="field-label">Data de início da recorrência</div>
      <input class="field-input" type="date" value="${p.dataInicio}" oninput="modal.payload.dataInicio=this.value">
      <div class="field-label" style="display:flex;align-items:center;gap:8px;justify-content:space-between;">
        <span>Data final</span>
        <button class="seg-btn" style="width:auto;padding:6px 12px;${p.semDataFim?'background:var(--amarelo);border-color:var(--amarelo);color:#141100;':''}" onclick="toggleSemDataFimRecorrencia()">Sem data final</button>
      </div>
      ${!p.semDataFim ? `<input class="field-input" type="date" value="${p.dataFim||''}" oninput="modal.payload.dataFim=this.value">` : ''}
      <div class="field-row">
        ${p.editing ? `<button class="btn btn-danger" onclick="confirmarExcluirRecorrencia()">Excluir</button>`:''}
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarNovaRecorrencia()">Salvar</button>
      </div>
    </div>
  </div>`;
}

function renderModalProdutoEstoque(){
  const p = modal.payload;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>${p.editing?'Editar':'Novo'} produto — ${p.unidade}</h3>
      <div class="field-label">Nome do produto</div>
      <input class="field-input" id="pe-nome" value="${(p.nome||'').replace(/"/g,'&quot;')}" placeholder="Ex: Pão de hambúrguer">
      <div class="field-label">Unidade de medida</div>
      <input class="field-input" id="pe-medida" value="${(p.unidadeMedida||'un').replace(/"/g,'&quot;')}" placeholder="un, kg, L, fatia...">
      <div class="field-label">Estoque mínimo</div>
      <input class="field-input" id="pe-minimo" type="number" min="0" value="${p.estoqueMinimo ?? ''}" placeholder="Ex: 50">
      <div style="font-size:11px;color:var(--cinza-claro);margin-top:6px;">Quando o estoque final ficar abaixo desse número, o item fica vermelho (reposição urgente).</div>
      <div class="field-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarProdutoEstoque()">Salvar</button>
      </div>
    </div>
  </div>`;
}

function renderModalConfirmExcluirProduto(){
  const p = modal.payload;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>Excluir produto?</h3>
      <div style="font-size:13px;color:var(--cinza-claro);">Tem certeza que deseja excluir "${p.nome}"? As contagens já registradas continuam no histórico, mas o produto some da conferência.</div>
      <div class="field-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-danger" onclick="executarExcluirProdutoEstoque()">Excluir</button>
      </div>
    </div>
  </div>`;
}

/* ================= TOAST ================= */
function showToast(msg){
  toastMsg = msg;
  render();
  setTimeout(()=>{ toastMsg=null; render(); }, 2600);
}
function renderToast(){
  return `<div class="toast">✅ ${toastMsg}</div>`;
}

/* ================= HOOKS PÓS-RENDER ================= */
function afterRenderHooks(){
  if(currentTab==='dashboard' && isAdmin()){
    setTimeout(drawDashboardCharts, 30);
  }
}

/* ================= INIT ================= */
if(FIREBASE_ATIVO){
  initFirebase();
  render();
} else {
  render();
}
</script>
</body>
</html>
