<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dom Cellebre Burger — Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  /* ---- Identidade Dom Cellebre Burger: preto + amarelo ---- */
  --preto-0:#000000;
  --preto-1:#121212;
  --preto-2:#1B1B1B;
  --preto-3:#282828;
  --branco:#FFFFFF;
  --cinza-claro:#B8B8B8;
  --amarelo:#FFB800;
  --amarelo-escuro:#C98F00;
  --amarelo-suave:rgba(255,184,0,.14);
  /* ---- Cores semânticas (mantidas do briefing original) ---- */
  --alface:#3FA33B;
  --alface-escuro:#256321;
  --tomate:#E4483A;
  --tomate-escuro:#992F25;
  --azul:#3D8EF5;
  --azul-escuro:#2159A8;
  --borda:#2C2C2C;
  --sombra:0 10px 28px rgba(0,0,0,.5);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--preto-0);
  color:var(--branco);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  background-image:
    radial-gradient(circle at 8% 0%, rgba(255,184,0,.07), transparent 42%),
    radial-gradient(circle at 92% 100%, rgba(255,184,0,.05), transparent 40%);
}
h1,h2,h3,.display{font-family:'Archivo Black',sans-serif;font-weight:400;letter-spacing:.5px;}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--borda);border-radius:8px;}
a{color:inherit;}

#app{min-height:100vh;display:flex;flex-direction:column;}

/* ---------- LOGO ---------- */
.logo-mark{
  border-radius:14px;background:#000;border:1.5px solid var(--amarelo);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;
}
.brand-logo-badge{width:100%;height:100%;object-fit:cover;object-position:center 30%;transform:scale(1.55);}
.brand-logo-full{width:100%;max-width:210px;height:auto;display:block;margin:0 auto;}
.brand-logo-img{border-radius:14px;object-fit:cover;flex-shrink:0;}
.slogan{
  color:var(--amarelo);font-size:12.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  margin-top:10px;text-align:center;
}

/* ---------- TOPBAR ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--preto-1);border-bottom:1px solid var(--borda);
  position:sticky;top:0;z-index:50;gap:10px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:12px;min-width:0;}
.brand .logo-mark{width:42px;height:42px;}
.brand-text{line-height:1.2;min-width:0;}
.brand-text .t1{font-family:'Archivo Black';font-size:14.5px;color:var(--branco);}
.brand-text .t2{font-size:11px;color:var(--cinza-claro);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px;}
.context-pill{
  display:inline-flex;align-items:center;gap:5px;background:var(--preto-2);border:1px solid var(--borda);
  padding:2px 9px;border-radius:20px;font-size:10.5px;color:var(--amarelo);font-weight:700;
}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--cinza-claro);}
.user-chip b{color:var(--branco);font-weight:700;}
.badge-role{
  font-size:10px;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;font-weight:800;
}
.badge-admin{background:var(--amarelo-suave);color:var(--amarelo);}
.badge-colab{background:rgba(61,142,245,.16);color:var(--azul);}
.btn-icon{
  width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--preto-2);border:1px solid var(--borda);font-size:16px;color:var(--cinza-claro);
}
.btn-icon:active{transform:scale(.94);}
.btn-menu-principal{
  display:flex;align-items:center;gap:7px;padding:10px 15px;border-radius:13px;
  background:var(--preto-2);border:1px solid var(--borda);font-size:12.5px;font-weight:800;
  color:var(--branco);white-space:nowrap;
}
.btn-menu-principal:active{transform:scale(.96);}

.container{max-width:760px;margin:0 auto;width:100%;padding:20px;flex:1;}
.container-wide{max-width:1180px;}

/* ---------- BUTTONS ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:15px 24px;border-radius:16px;font-weight:800;font-size:15px;
  transition:transform .1s ease, box-shadow .15s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--amarelo);color:#141100;box-shadow:0 6px 18px rgba(255,184,0,.28);}
.btn-primary:disabled{background:var(--preto-3);color:var(--cinza-claro);box-shadow:none;opacity:.6;}
.btn-secondary{background:var(--preto-2);color:var(--branco);border:1px solid var(--borda);}
.btn-ghost{background:transparent;color:var(--cinza-claro);border:1px solid var(--borda);}
.btn-success{background:var(--alface);color:#fff;}
.btn-danger{background:var(--tomate);color:#fff;}
.btn-block{width:100%;}
.btn-sm{padding:10px 15px;font-size:13px;border-radius:12px;}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-hero{text-align:center;margin-bottom:26px;}
.login-hero p{color:var(--cinza-claro);font-size:12.5px;margin-top:8px;text-transform:uppercase;letter-spacing:1.8px;font-weight:600;}
.login-card{
  width:100%;max-width:430px;background:var(--preto-1);border:1px solid var(--borda);
  border-radius:24px;padding:26px;box-shadow:var(--sombra);
}
.login-section-label{
  font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--amarelo);
  margin:18px 0 10px;font-weight:800;
}
.login-section-label:first-child{margin-top:0;}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.user-btn{
  padding:15px 10px;border-radius:14px;background:var(--preto-2);border:1.5px solid var(--borda);
  text-align:center;font-weight:700;font-size:14px;transition:all .12s ease;
}
.user-btn:active{transform:scale(.96);}
.user-btn.selected{border-color:var(--amarelo);background:var(--amarelo-suave);color:var(--amarelo);}
.pass-field{
  width:100%;margin-top:18px;padding:15px 16px;border-radius:14px;background:var(--preto-2);
  border:1.5px solid var(--borda);color:var(--branco);font-size:16px;outline:none;
}
.pass-field:focus{border-color:var(--amarelo);}
.login-error{color:var(--tomate);font-size:13px;margin-top:10px;text-align:center;font-weight:700;}

/* ---------- SETUP FLOW (unidade/setor/tipo) ---------- */
.setup-wrap{padding:20px 4px;max-width:560px;margin:0 auto;}
.setup-title{font-size:21px;margin-bottom:6px;}
.setup-sub{color:var(--cinza-claro);font-size:13px;margin-bottom:22px;}
.option-card{
  display:flex;align-items:center;gap:14px;padding:18px;border-radius:18px;position:relative;
  background:var(--preto-1);border:1.5px solid var(--borda);margin-bottom:12px;transition:all .12s ease;
}
.option-card:active{transform:scale(.98);}
.option-card.selected{border-color:var(--amarelo);background:var(--amarelo-suave);}
.option-card.oil-option{border-color:rgba(255,184,0,.5);}
.option-card-badge{position:absolute;top:14px;right:14px;width:13px;height:13px;border-radius:50%;border:2px solid var(--preto-1);}
.option-card-badge.verde{background:var(--alface);}
.option-card-badge.amarelo{background:var(--amarelo);}
.option-card-badge.vermelho{background:var(--tomate);}
.option-card-badge.nunca{background:var(--cinza-claro);}
.option-icon{
  width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;background:var(--preto-2);
}
.option-title{font-weight:800;font-size:15px;}
.option-sub{font-size:12px;color:var(--cinza-claro);margin-top:2px;}
.step-dots{display:flex;gap:6px;margin-bottom:20px;}
.step-dot{height:4px;flex:1;border-radius:4px;background:var(--preto-3);}
.step-dot.active{background:var(--amarelo);}
.step-dot.done{background:var(--alface);}

/* ---------- CHECKLIST ---------- */
.checklist-header{
  background:var(--preto-1);border-radius:22px;padding:22px;margin-bottom:18px;border:1px solid var(--borda);
  position:relative;overflow:hidden;
}
.checklist-header::before{
  content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,184,0,.14), transparent 70%);
}
.comanda-tag{
  display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--amarelo);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:800;margin-bottom:8px;
}
.checklist-header h2{font-size:19px;line-height:1.3;}
.checklist-meta{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--cinza-claro);flex-wrap:wrap;}
.checklist-meta span{display:flex;align-items:center;gap:5px;}

.progress-track{
  height:11px;background:var(--preto-3);border-radius:20px;overflow:hidden;margin-top:16px;position:relative;
}
.progress-fill{
  height:100%;border-radius:20px;background:linear-gradient(90deg,var(--tomate),var(--amarelo),var(--alface));
  transition:width .4s cubic-bezier(.34,1.3,.64,1);
}
.progress-label{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--cinza-claro);font-weight:600;}
.progress-label b{color:var(--branco);}

/* ---------- ACCORDION DE CATEGORIAS ---------- */
.cat-group{
  background:var(--preto-1);border:1px solid var(--borda);border-radius:18px;margin-bottom:12px;overflow:hidden;
}
.cat-header{
  display:flex;align-items:center;gap:12px;padding:16px 18px;width:100%;text-align:left;
}
.cat-icon{
  width:38px;height:38px;border-radius:11px;background:var(--preto-2);display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.cat-info{flex:1;min-width:0;}
.cat-name{font-weight:800;font-size:14.5px;}
.cat-progress-mini{font-size:11.5px;color:var(--cinza-claro);margin-top:2px;}
.cat-check-badge{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;
  background:var(--preto-2);color:var(--cinza-claro);flex-shrink:0;
}
.cat-check-badge.complete{background:var(--alface);color:#fff;}
.cat-chevron{font-size:12px;color:var(--cinza-claro);transition:transform .2s ease;flex-shrink:0;}
.cat-chevron.open{transform:rotate(180deg);}
.accordion-content{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease;}
.accordion-content.open{grid-template-rows:1fr;}
.accordion-inner{overflow:hidden;min-height:0;}
.cat-body{padding:0 14px 14px;}

.task-item{
  display:flex;align-items:flex-start;gap:14px;padding:14px;background:var(--preto-2);
  border:1px solid var(--borda);border-radius:14px;margin-bottom:8px;transition:all .15s ease;
}
.task-item.done{border-color:rgba(63,163,59,.4);background:rgba(63,163,59,.07);}
.task-check{
  width:27px;height:27px;border-radius:9px;border:2px solid var(--cinza-claro);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.task-item.done .task-check{background:var(--alface);border-color:var(--alface);color:#fff;animation:checkPop .28s ease;}
@keyframes checkPop{0%{transform:scale(.6);}55%{transform:scale(1.18);}100%{transform:scale(1);}}
.task-body{flex:1;min-width:0;}
.task-name{font-weight:600;font-size:14.5px;line-height:1.4;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.task-item.done .task-name{color:var(--cinza-claro);text-decoration:line-through;text-decoration-color:var(--alface-escuro);}
.task-dif-badge{
  display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;
  padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap;text-decoration:none;
  letter-spacing:.2px;
}
.task-name-text{min-width:0;}
.task-pts{
  display:inline-block;font-size:11px;font-weight:800;color:var(--amarelo);background:var(--amarelo-suave);
  padding:2px 9px;border-radius:20px;margin-top:6px;
}
.task-req{color:var(--tomate);font-size:10px;font-weight:800;margin-left:6px;text-transform:uppercase;}
.task-done-info{font-size:11.5px;color:var(--alface);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;}
.task-late{color:var(--tomate)!important;}
.task-admin-actions{display:flex;gap:6px;margin-top:8px;}

.fab-finish{position:sticky;bottom:16px;margin-top:20px;}

/* ---------- CARDS / DASHBOARD ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.stat-card{background:var(--preto-1);border:1px solid var(--borda);border-radius:18px;padding:17px;}
.stat-card .val{font-family:'Archivo Black';font-size:25px;color:var(--branco);}
.stat-card .lbl{font-size:11.5px;color:var(--cinza-claro);text-transform:uppercase;letter-spacing:.7px;margin-top:4px;font-weight:700;}
.stat-card.accent-amarelo .val{color:var(--amarelo);}
.stat-card.accent-alface .val{color:var(--alface);}
.stat-card.accent-tomate .val{color:var(--tomate);}
.stat-card.accent-azul .val{color:var(--azul);}

.section-title{font-size:17px;margin:24px 0 14px;display:flex;align-items:center;gap:10px;}
.section-title .line{flex:1;height:1px;background:var(--borda);}

.card{background:var(--preto-1);border:1px solid var(--borda);border-radius:18px;padding:18px;margin-bottom:14px;}

.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;}
.tab{
  padding:11px 17px;border-radius:13px;font-size:13px;font-weight:800;white-space:nowrap;
  background:var(--preto-2);color:var(--cinza-claro);border:1px solid var(--borda);flex-shrink:0;
}
.tab.active{background:var(--amarelo);color:#141100;border-color:var(--amarelo);}

.unit-switch{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;}
.unit-switch button{
  padding:10px 16px;border-radius:13px;font-size:12.5px;font-weight:800;white-space:nowrap;
  background:var(--preto-2);color:var(--cinza-claro);border:1px solid var(--borda);flex-shrink:0;display:flex;align-items:center;gap:6px;
}
.unit-switch button.active{background:var(--amarelo);color:#141100;border-color:var(--amarelo);}

/* ---------- RANKING / PODIUM ---------- */
.podium{display:flex;align-items:flex-end;gap:10px;justify-content:center;margin:20px 0 26px;}
.podium-spot{flex:1;max-width:120px;text-align:center;}
.podium-avatar{
  width:56px;height:56px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black';font-size:20px;border:3px solid var(--preto-0);
}
.podium-1 .podium-avatar{background:var(--amarelo);color:#141100;width:70px;height:70px;font-size:25px;}
.podium-2 .podium-avatar{background:#D8D8D8;color:#141100;}
.podium-3 .podium-avatar{background:#8A5A20;color:#fff;}
.podium-name{font-weight:800;font-size:13px;}
.podium-pts{font-size:11px;color:var(--cinza-claro);margin-top:2px;}
.podium-bar{border-radius:12px 12px 0 0;margin-top:10px;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;}
.podium-1 .podium-bar{height:90px;background:linear-gradient(180deg,var(--amarelo),var(--amarelo-escuro));}
.podium-2 .podium-bar{height:66px;background:linear-gradient(180deg,#D8D8D8,#96938c);}
.podium-3 .podium-bar{height:48px;background:linear-gradient(180deg,#8A5A20,#5c3b14);}
.podium-medal{font-family:'Archivo Black';color:rgba(0,0,0,.4);font-size:15px;}

.rank-row{
  display:flex;align-items:center;gap:12px;padding:14px;background:var(--preto-1);
  border:1px solid var(--borda);border-radius:15px;margin-bottom:8px;
}
.rank-pos{
  width:29px;height:29px;border-radius:9px;background:var(--preto-2);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:var(--cinza-claro);flex-shrink:0;
}
.rank-info{flex:1;min-width:0;}
.rank-name{font-weight:800;font-size:14px;}
.rank-sub{font-size:11.5px;color:var(--cinza-claro);margin-top:2px;}
.rank-pts{text-align:right;flex-shrink:0;}
.rank-pts .n{font-family:'Archivo Black';font-size:16px;color:var(--amarelo);}
.rank-pts .l{font-size:9.5px;color:var(--cinza-claro);text-transform:uppercase;}

/* ---------- FORMS / MODAL ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}
.modal-box{
  background:var(--preto-1);border-radius:22px;border:1px solid var(--borda);padding:24px;
  max-width:440px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--sombra);
}
.modal-box h3{font-size:18px;margin-bottom:16px;}
.field-label{font-size:12px;font-weight:800;color:var(--cinza-claro);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;}
.field-label:first-child{margin-top:0;}
.field-input{
  width:100%;padding:13px 14px;border-radius:13px;background:var(--preto-2);border:1.5px solid var(--borda);
  color:var(--branco);font-size:14.5px;outline:none;
}
.field-input:focus{border-color:var(--amarelo);}
select.field-input{appearance:none;}
.field-row{display:flex;gap:10px;margin-top:20px;}
.field-row .btn{flex:1;}
.seg-control{display:flex;gap:6px;margin-top:6px;}
.seg-btn{flex:1;padding:11px;border-radius:12px;background:var(--preto-2);border:1.5px solid var(--borda);font-size:13px;font-weight:800;color:var(--cinza-claro);}
.seg-btn.active{background:var(--amarelo);border-color:var(--amarelo);color:#141100;}

/* ---------- LISTS / TASK MANAGE ---------- */
.manage-task-row{
  display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--preto-1);border:1px solid var(--borda);
  border-radius:14px;margin-bottom:8px;
}
.manage-task-name{flex:1;font-size:13.5px;font-weight:700;}
.manage-task-meta{font-size:11px;color:var(--cinza-claro);}
.icon-btn-sm{
  width:31px;height:31px;border-radius:10px;background:var(--preto-2);border:1px solid var(--borda);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
}

/* ---------- FILTERS ---------- */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;}
.filter-bar select, .filter-bar input{
  padding:11px 13px;border-radius:12px;background:var(--preto-1);border:1px solid var(--borda);color:var(--branco);
  font-size:12.5px;flex-shrink:0;min-width:120px;
}

/* ---------- HISTORY ---------- */
.hist-row{
  display:flex;align-items:center;gap:12px;padding:15px;background:var(--preto-1);border:1px solid var(--borda);
  border-radius:15px;margin-bottom:8px;
}
.hist-status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hist-status-dot.completo{background:var(--alface);}
.hist-status-dot.pendente{background:var(--tomate);}
.hist-body{flex:1;min-width:0;}
.hist-title{font-weight:800;font-size:13.5px;}
.hist-sub{font-size:11.5px;color:var(--cinza-claro);margin-top:2px;}
.hist-pts{font-family:'Archivo Black';font-size:14px;color:var(--amarelo);flex-shrink:0;}

/* ---------- TOAST / CONFETTI ---------- */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--preto-1);
  border:1px solid var(--alface);border-radius:16px;padding:14px 22px;display:flex;align-items:center;gap:10px;
  z-index:300;box-shadow:var(--sombra);font-weight:700;font-size:14px;animation:toastIn .3s ease;
}
@keyframes toastIn{from{transform:translate(-50%,20px);opacity:0;}to{transform:translate(-50%,0);opacity:1;}}
.celebrate-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:400;padding:24px;text-align:center;animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.celebrate-emoji{font-size:56px;margin-bottom:14px;}
.celebrate-overlay h2{font-size:24px;color:var(--amarelo);margin-bottom:8px;}
.celebrate-overlay p{color:var(--cinza-claro);margin-bottom:24px;}
.celebrate-pts{font-family:'Archivo Black';font-size:46px;color:var(--alface);margin-bottom:6px;}

/* ---------- BOTTOM NAV ---------- */
.bottom-nav{
  position:sticky;bottom:0;background:var(--preto-1);border-top:1px solid var(--borda);
  display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:50;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;
  color:var(--cinza-claro);font-size:10px;font-weight:700;
}
.nav-item.active{color:var(--amarelo);}
.nav-icon{font-size:19px;}

.empty-state{text-align:center;padding:50px 20px;color:var(--cinza-claro);}
.empty-state .ic{font-size:38px;margin-bottom:12px;}

.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-dot.on{background:var(--alface);box-shadow:0 0 0 3px rgba(63,163,59,.18);}
.sync-dot.off{background:var(--tomate);}
.sync-dot.loading{background:var(--amarelo);animation:pulseDot 1s infinite;}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.35;}}
.sync-label{font-size:10px;color:var(--cinza-claro);}

.boot-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.boot-screen .logo-mark{width:68px;height:68px;margin-bottom:18px;border-radius:18px;}
.boot-screen p{color:var(--cinza-claro);font-size:13px;margin-top:10px;}
.boot-spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--preto-3);border-top-color:var(--amarelo);animation:spin .8s linear infinite;margin-top:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

.setup-banner{
  background:rgba(228,72,58,.1);border:1px solid var(--tomate);border-radius:16px;padding:14px 16px;margin-bottom:16px;
}
.setup-banner b{color:var(--tomate);}
.setup-banner p{font-size:12.5px;color:var(--cinza-claro);margin-top:4px;line-height:1.5;}

.chart-wrap{background:var(--preto-1);border:1px solid var(--borda);border-radius:18px;padding:16px;margin-bottom:14px;height:260px;position:relative;}
.chart-wrap h3{font-size:13px;margin-bottom:10px;color:var(--cinza-claro);text-transform:uppercase;letter-spacing:.5px;}

.search-box{
  display:flex;align-items:center;gap:10px;background:var(--preto-1);border:1px solid var(--borda);
  border-radius:14px;padding:12px 14px;margin-bottom:16px;
}
.search-box input{flex:1;background:transparent;border:none;color:var(--branco);font-size:14px;outline:none;}

.confirm-check-list{max-height:200px;overflow-y:auto;margin:14px 0;}
.confirm-check-item{display:flex;gap:8px;align-items:center;font-size:13px;padding:6px 0;color:var(--cinza-claro);}

/* ---------- TROCA DE ÓLEO ---------- */
.oil-pill{cursor:pointer;border:none;}
.oil-pill.verde{background:rgba(63,163,59,.18);color:var(--alface);}
.oil-pill.amarelo{background:rgba(255,184,0,.18);color:var(--amarelo);}
.oil-pill.vermelho{background:rgba(228,72,58,.22);color:var(--tomate);}
.oil-pill.nunca{background:var(--preto-2);color:var(--cinza-claro);}
.oil-banner{border-radius:18px;padding:18px;margin-bottom:16px;border:1.5px solid;}
.oil-banner.verde{background:rgba(63,163,59,.1);border-color:var(--alface);}
.oil-banner.amarelo{background:rgba(255,184,0,.1);border-color:var(--amarelo);}
.oil-banner.vermelho{background:rgba(228,72,58,.12);border-color:var(--tomate);animation:pulseBorder 1.4s infinite;}
.oil-banner.nunca{background:rgba(255,255,255,.05);border-color:var(--borda);}
@keyframes pulseBorder{0%,100%{box-shadow:0 0 0 0 rgba(228,72,58,.35);}50%{box-shadow:0 0 0 9px rgba(228,72,58,0);}}
.oil-banner h3{font-size:16px;margin-bottom:4px;}
.oil-banner p{font-size:13px;color:var(--cinza-claro);}
.oil-days-counter{font-family:'Archivo Black';font-size:20px;margin-top:10px;color:var(--branco);}

/* ---------- ESCALA / CALENDÁRIO ---------- */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-header{margin-bottom:6px;}
.cal-dow{text-align:center;font-size:10.5px;color:var(--cinza-claro);font-weight:700;text-transform:uppercase;}
.cal-cell{
  aspect-ratio:1;border-radius:11px;background:var(--preto-2);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;border:1.5px solid transparent;position:relative;cursor:pointer;
}
.cal-cell:active{transform:scale(.94);}
.cal-cell.empty{background:transparent;cursor:default;}
.cal-cell.hoje{border-color:var(--amarelo);}
.cal-daynum{font-size:12px;font-weight:700;color:var(--branco);}
.cal-dot{width:7px;height:7px;border-radius:50%;}
.cal-recorrencia-badge{position:absolute;top:2px;right:3px;font-size:8px;line-height:1;}
.legend-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--cinza-claro);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
input[type="date"], input[type="time"], input[type="datetime-local"]{color-scheme:dark;}

/* ---------- CONTROLE DE ESTOQUE ---------- */
.estoque-resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.estoque-resumo-card{border-radius:16px;padding:14px 8px;text-align:center;border:1.5px solid;}
.estoque-resumo-card .n{font-family:'Archivo Black';font-size:26px;line-height:1;}
.estoque-resumo-card .l{font-size:10.5px;margin-top:5px;font-weight:700;}
.estoque-resumo-card.verde{background:rgba(63,163,59,.1);border-color:var(--alface);}
.estoque-resumo-card.amarelo{background:rgba(255,184,0,.1);border-color:var(--amarelo);}
.estoque-resumo-card.vermelho{background:rgba(228,72,58,.1);border-color:var(--tomate);}
.estoque-card{background:var(--preto-1);border:1.5px solid var(--borda);border-left-width:5px;border-radius:16px;padding:15px;margin-bottom:12px;}
.estoque-card.verde{border-left-color:var(--alface);}
.estoque-card.amarelo{border-left-color:var(--amarelo);}
.estoque-card.vermelho{border-left-color:var(--tomate);}
.estoque-card.cinza{border-left-color:var(--cinza-claro);}
.estoque-card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.estoque-nome{font-weight:800;font-size:15px;}
.estoque-status{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.estoque-status.verde{color:var(--alface);background:rgba(63,163,59,.16);}
.estoque-status.amarelo{color:var(--amarelo);background:rgba(255,184,0,.16);}
.estoque-status.vermelho{color:var(--tomate);background:rgba(228,72,58,.16);}
.estoque-status.cinza{color:var(--cinza-claro);background:var(--preto-2);}
.estoque-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.estoque-inputs label{display:block;font-size:11px;color:var(--cinza-claro);margin-bottom:4px;font-weight:600;}
.estoque-inputs .field-input{margin:0;}
.estoque-calc{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding-top:12px;border-top:1px solid var(--borda);}
.estoque-calc>div{text-align:center;}
.estoque-calc span{display:block;font-size:10px;color:var(--cinza-claro);margin-bottom:3px;}
.estoque-calc b{font-size:14px;}
.estoque-calc b.destaque-repor{color:var(--tomate);}
@media(max-width:420px){
  .estoque-calc{grid-template-columns:repeat(2,1fr);gap:10px;}
}

@media(min-width:640px){
  .container{padding:32px;}
  .login-wrap{padding:40px;}
  .grid3{grid-template-columns:1fr 1fr 1fr;}
}
@media(min-width:900px){
  .container-wide{padding:36px 44px;}
  .grid2.charts-grid{grid-template-columns:1fr 1fr;}
}
</style>

function fmtTime(iso){ if(!iso) return '--:--'; const d=new Date(iso); return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso){ if(!iso) return '--'; const d=new Date(iso); return d.toLocaleDateString('pt-BR'); }

function fmtDateLong(iso){ const d = iso? new Date(iso): new Date(); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
// Converte um objeto Date para uma chave 'AAAA-MM-DD' usando o horário LOCAL
// (evita o bug clássico de virar o dia errado perto da meia-noite por causa do UTC).
function toDateKey(date){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function todayKey(){ return toDateKey(new Date()); }
// Formata uma chave 'AAAA-MM-DD' (data pura, sem hora) para exibição, sem passar
// por new Date() — isso evita deslocar o dia por causa de fuso horário.
function fmtDateOnly(dk){
  if(!dk) return '--';
  const [y,m,d] = dk.split('-');
  return `${d}/${m}/${y}`;
}

/* ---------- TROCA DE ÓLEO (Moda Center) ----------
   Nova regra: a troca é sempre feita manualmente numa quinta-feira, antes do
   expediente. O óleo dura a semana da troca + a semana seguinte (quinta e
   sexta de cada uma), então a próxima troca cai sempre exatamente 14 dias
   depois da data escolhida (a "terceira quinta-feira").
---------------------------------------------------------------------- */
function calcularProximaTrocaSimples(dataTrocaKey){
  const [y,m,d] = dataTrocaKey.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+14);
  return toDateKey(dt);
}
function diffDiasChaves(deKey, paraKey){
  const [y1,m1,d1] = deKey.split('-').map(Number);
  const [y2,m2,d2] = paraKey.split('-').map(Number);
  const a = new Date(y1,m1-1,d1);
  const b = new Date(y2,m2-1,d2);
  return Math.round((b-a)/86400000);
}

function getUltimaTrocaOleo(){
  if(!state.trocasOleo || state.trocasOleo.length===0) return null;
  return [...state.trocasOleo].sort((a,b)=>{
    if(a.dataTroca===b.dataTroca) return (b.registradoEm||'').localeCompare(a.registradoEm||'');
    return b.dataTroca.localeCompare(a.dataTroca);
  })[0];
}

function calcularStatusOleoAtual(){
  const ultima = getUltimaTrocaOleo();
  if(!ultima){
    return {cor:'nunca', icone:'⚪', titulo:'Nenhuma troca registrada', mensagem:'Registre a data da última troca de óleo abaixo.', proximaTroca:null, diasRestantes:null};
  }
  const hojeKey = todayKey();
  const diasRestantes = diffDiasChaves(hojeKey, ultima.proximaTroca);
  if(diasRestantes <= 0){
    return {cor:'vermelho', icone:'🔴', titulo:'TROCA DE ÓLEO VENCIDA!', mensagem:'Substitua o óleo antes do início do expediente.', proximaTroca:ultima.proximaTroca, diasRestantes};
  }
  if(diasRestantes <= 3){
    return {cor:'amarelo', icone:'🟡', titulo:'Troca de óleo próxima', mensagem:`Faltam ${diasRestantes} dia(s) para a próxima troca, em ${fmtDateOnly(ultima.proximaTroca)}.`, proximaTroca:ultima.proximaTroca, diasRestantes};

/* ---------- ESCALA RECORRENTE (só João e Giulia podem gerenciar) ----------
   Uma regra de recorrência gera automaticamente uma "ocorrência" em todo dia
   da semana escolhido, dentro do intervalo de datas definido. O calendário
   nunca grava essas ocorrências fisicamente — ele as calcula on-the-fly a
   partir da regra. Só quando alguém edita/cancela UM dia específico é que
   uma entrada de exceção é criada em state.escalas, que passa a ter
   prioridade sobre a regra apenas para aquela data (sem alterar a regra).
------------------------------------------------------------------------ */
function getRecorrenciaParaDia(userId, dataKey){
  const [y,m,d] = dataKey.split('-').map(Number);
  const weekday = new Date(y,m-1,d).getDay();
  const regras = (state.escalaRecorrencias||[]).filter(r=>r.userId===userId);
  return regras.find(r=>{
    if(!r.diasSemana.includes(weekday)) return false;
    if(dataKey < r.dataInicio) return false;
    if(r.dataFim && dataKey > r.dataFim) return false;
    return true;
  }) || null;
}

// Entrada "efetiva" de um dia: prioriza uma exceção manual gravada em
// state.escalas; se não houver, usa a regra de recorrência (se aplicável);
// se não houver nenhuma das duas, retorna null (dia em branco).
function getEscalaEfetivaDia(userId, dataKey){
  const override = getEscalaDia(userId, dataKey);
  if(override) return {...override, _origemRecorrencia:false};
  const regra = getRecorrenciaParaDia(userId, dataKey);
  if(regra){
    return {
      id:null, userId, data:dataKey, tipo:regra.tipo, entrada:regra.entrada, saida:regra.saida,
      unidade:regra.unidade, observacoes:regra.observacoes, _origemRecorrencia:true, _recorrenciaId:regra.id,
    };
  }
  return null;
}

function criarRecorrenciaSemSalvar(dados){
  const regra = {
    id: uid(), userId: dados.userId, diasSemana: [...dados.diasSemana].sort((a,b)=>a-b),
    entrada: dados.entrada, saida: dados.saida, tipo: dados.tipo, unidade: dados.unidade,
    observacoes: dados.observacoes, dataInicio: dados.dataInicio, dataFim: dados.dataFim || null,
    criadoPor: currentUser().nome, criadoEm: nowISO(),
  };
  state.escalaRecorrencias.push(regra);
  if(regra.userId !== currentUser().id){
    const diasTxt = regra.diasSemana.map(d=>DIAS_SEMANA_LABEL[d]).join(', ');
    state.notificacoesEscala.push({id:uid(), userId:regra.userId, mensagem:`Você tem um novo horário recorrente: ${diasTxt}, ${regra.entrada}–${regra.saida}.`, criadoEm:nowISO(), lida:false});
  }
  return regra;
}
function criarRecorrencia(dados){
  criarRecorrenciaSemSalvar(dados);

}

  const r = state.escalaRecorrencias.find(x=>x.id===id);

/* ---------- CONTROLE DE ESTOQUE ----------
   - Produtos são cadastrados por admin, separados por unidade.
   - Contagens (estoque inicial/final) são por produto e por "período" (a data
     da contagem). O id da contagem é determinístico (unidade+produto+período)
     para dois aparelhos não criarem contagens duplicadas do mesmo item/dia.
   - Todos os cálculos (consumido, restante, a repor, status) são feitos na
     hora a partir desses números — nunca ficam salvos "congelados".
------------------------------------------------------------------------ */
function getProdutosEstoque(unidade){
  return (state.estoqueProdutos||[]).filter(p=>p.unidade===unidade);
}
function contagemIdDeterministico(unidade, produtoId, periodo){
  return 'ec_' + `${unidade}|${produtoId}|${periodo}`.toLowerCase().replace(/[^a-z0-9]+/g,'_');
}
function getContagem(unidade, produtoId, periodo){
  return (state.estoqueContagens||[]).find(c=>c.unidade===unidade && c.produtoId===produtoId && c.periodo===periodo) || null;
}

// Núcleo dos cálculos de um item. Recebe os números crus e devolve tudo
// derivado, sempre de forma consistente e protegida contra valores inválidos.
function calcularEstoqueItem(produto, contagem){
  const inicial = contagem && contagem.inicial !== null && contagem.inicial !== undefined ? Number(contagem.inicial) : null;
  const final = contagem && contagem.final !== null && contagem.final !== undefined ? Number(contagem.final) : null;
  const minimo = Number(produto.estoqueMinimo) || 0;

  let consumido = null, restante = null, aRepor = null;
  if(inicial !== null && final !== null){
    // Consumido nunca é negativo (se repuseram no meio do período, trata como 0).
    consumido = Math.max(0, inicial - final);
    restante = final;
    // Quanto falta para voltar ao mínimo. Se já está acima do mínimo, é 0.
    aRepor = Math.max(0, minimo - final);
  } else if(final !== null){
    restante = final;
    aRepor = Math.max(0, minimo - final);
  }

  // Status por cor, com base no estoque restante (final) versus o mínimo.
  let status = 'sem-dados', cor = 'cinza', mensagem = 'Sem contagem';
  if(restante !== null){
    if(minimo <= 0){
      status='ok'; cor='verde'; mensagem='Estoque OK';
    } else if(restante < minimo){
      status='baixo'; cor='vermelho'; mensagem='Reposição urgente';
    } else if(restante <= minimo * 1.25){
      // até 25% acima do mínimo = zona de atenção
      status='atencao'; cor='amarelo'; mensagem='Reposição em breve';
    } else {
      status='ok'; cor='verde'; mensagem='Estoque OK';
    }
  }
  return {inicial, final, minimo, consumido, restante, aRepor, status, cor, mensagem};
}

function resumoEstoque(unidade, periodo){
  const produtos = getProdutosEstoque(unidade);
  let verde=0, amarelo=0, vermelho=0, semDados=0;
  produtos.forEach(p=>{
    const calc = calcularEstoqueItem(p, getContagem(unidade, p.id, periodo));
    if(calc.cor==='verde') verde++;
    else if(calc.cor==='amarelo') amarelo++;
    else if(calc.cor==='vermelho') vermelho++;
    else semDados++;
  });
  return {verde, amarelo, vermelho, semDados, total:produtos.length};
}

// Salva a contagem (inicial e/ou final) de um item e registra no histórico.
function salvarContagemEstoque(unidade, produtoId, periodo, campos){
  let c = getContagem(unidade, produtoId, periodo);
  const isNovo = !c;
  if(!c){
    c = {id: contagemIdDeterministico(unidade, produtoId, periodo), unidade, produtoId, periodo, inicial:null, final:null};
    state.estoqueContagens.push(c);
  }
  const antes = {inicial:c.inicial, final:c.final};
  if(campos.inicial !== undefined) c.inicial = campos.inicial === '' || campos.inicial === null ? null : Number(campos.inicial);
  if(campos.final !== undefined) c.final = campos.final === '' || campos.final === null ? null : Number(campos.final);
  c.atualizadoPor = currentUser().nome;
  c.atualizadoEm = nowISO();

  const produto = (state.estoqueProdutos||[]).find(p=>p.id===produtoId);
  const alteracoes = [];
  if(antes.inicial !== c.inicial) alteracoes.push(`inicial: ${antes.inicial??'—'} → ${c.inicial??'—'}`);
  if(antes.final !== c.final) alteracoes.push(`final: ${antes.final??'—'} → ${c.final??'—'}`);
  if(alteracoes.length>0){
    state.estoqueHistorico.push({
      id: uid(), unidade, periodo, produtoId, produtoNome: produto? produto.nome : '(produto removido)',
      colaborador: currentUser().nome, em: nowISO(), alteracoes: alteracoes.join(' · '),
    });
  }
  saveState(state);
}

function criarProdutoEstoque(dados){
  state.estoqueProdutos.push({
    id: uid(), unidade: dados.unidade, nome: dados.nome,
    unidadeMedida: dados.unidadeMedida || 'un', estoqueMinimo: Number(dados.estoqueMinimo) || 0,
  });
  state.estoqueProdutosVersao = nowISO();
  state.estoqueHistorico.push({id:uid(), unidade:dados.unidade, periodo:null, colaborador:currentUser().nome, em:nowISO(), alteracoes:`Produto cadastrado: ${dados.nome}`});
  saveState(state);
}
function editarProdutoEstoque(id, dados){
  const p = (state.estoqueProdutos||[]).find(x=>x.id===id);
  if(!p) return;
  p.nome = dados.nome; p.unidadeMedida = dados.unidadeMedida || 'un'; p.estoqueMinimo = Number(dados.estoqueMinimo) || 0;
  state.estoqueProdutosVersao = nowISO();
  state.estoqueHistorico.push({id:uid(), unidade:p.unidade, periodo:null, colaborador:currentUser().nome, em:nowISO(), alteracoes:`Produto editado: ${p.nome} (mínimo ${p.estoqueMinimo})`});
  saveState(state);
}
function excluirProdutoEstoque(id){
  const p = (state.estoqueProdutos||[]).find(x=>x.id===id);
  state.estoqueProdutos = state.estoqueProdutos.filter(x=>x.id!==id);
  state.estoqueProdutosVersao = nowISO();
  if(p) state.estoqueHistorico.push({id:uid(), unidade:p.unidade, periodo:null, colaborador:currentUser().nome, em:nowISO(), alteracoes:`Produto excluído: ${p.nome}`});
  saveState(state);
}

function migrarTemplatesSeNecessario(templates, unidades){
  const keys = Object.keys(templates || {});
  if(keys.length===0) return defaultTemplates();
  const temFormatoAntigo = keys.some(k => k.split('|').length === 2);
  const temFormatoNovo = keys.some(k => k.split('|').length === 3);

  let resultado = {...templates};

  if(temFormatoAntigo && !temFormatoNovo){
    // Dados de uma versão anterior do sistema, onde as tarefas eram
    // compartilhadas entre unidades. Copiamos essas mesmas tarefas para
    // cada unidade atual, preservando tudo o que já foi configurado.
    resultado = {};
    unidades.forEach(u=>{
      keys.forEach(k=>{
        resultado[`${u}|${k}`] = JSON.parse(JSON.stringify(templates[k]));
      });
    });
  }

  // Garante que toda combinação unidade+setor+tipo exista (usa o padrão de fábrica
  // como fallback só quando a combinação realmente não existir de nenhuma forma).
  const defaults = defaultTemplates();
  unidades.forEach(u=>{
    SETORES.forEach(se=>{
      TIPOS.forEach(ti=>{
        const key = `${u}|${se}|${ti}`;
        if(!resultado[key]) resultado[key] = defaults[key] ? JSON.parse(JSON.stringify(defaults[key])) : [];
      });
    });
  });

  return resultado;
}

function migrarTrocasOleoSeNecessario(trocas){
  if(!trocas || trocas.length===0) return [];
  return trocas.map(t=>{
    // Registros da versão anterior tinham "dataHora" (data+hora do registro) em vez
    // de "dataTroca" (só a data, escolhida manualmente). Convertemos para o novo formato
    // sem perder o histórico já registrado.
    if(!t.dataTroca && t.dataHora){
      const dataTroca = toDateKey(new Date(t.dataHora));
      return {
        id: t.id, dataTroca, registradoEm: t.dataHora, colaborador: t.colaborador,
        observacoes: t.observacoes||'', proximaTroca: t.proximaTroca || calcularProximaTrocaSimples(dataTroca),
      };
    }
    return t;
  });
}

function mergeWithDefaults(parsed){
  const base = defaultState();
  if(!parsed) return base;
  const unidades = parsed.unidades || base.unidades;
  const templates = migrarTemplatesSeNecessario(parsed.templates, unidades);
  const trocasOleo = migrarTrocasOleoSeNecessario(parsed.trocasOleo);
  return {
    ...base, ...parsed, templates, unidades, trocasOleo,
    checklists: parsed.checklists || [],
    resetHistorico: parsed.resetHistorico || [],
    escalas: parsed.escalas || [],
    escalaRecorrencias: parsed.escalaRecorrencias || [],
    notificacoesEscala: parsed.notificacoesEscala || [],
    // Só semeia os produtos de exemplo se a chave nunca existiu (primeira vez).
    // Se já existir (mesmo vazia, porque o admin apagou tudo), respeita o que está salvo.
    estoqueProdutos: parsed.estoqueProdutos !== undefined ? parsed.estoqueProdutos : base.estoqueProdutos,
    estoqueContagens: parsed.estoqueContagens || [],
    estoqueHistorico: parsed.estoqueHistorico || [],
  };
}

function loadStateLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){ const s = defaultState(); localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); return s; }
    const merged = mergeWithDefaults(JSON.parse(raw));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    return merged;
  }catch(e){
    console.error('Erro ao carregar estado local', e);
    return defaultState();
  }
}

// Une dois arrays de objetos com campo "id", combinando os dois lados —
// nada que exista só no remoto (criado por outro aparelho nesse meio tempo)
// é perdido, e a versão local tem prioridade quando o mesmo id existe nos dois.
function mesclarArraysPorId(remotoArr, localArr){
  const porId = {};
  const ordem = [];
  (remotoArr||[]).forEach(item=>{ if(item && item.id){ if(!(item.id in porId)) ordem.push(item.id); porId[item.id]=item; } });
  (localArr||[]).forEach(item=>{ if(item && item.id){ if(!(item.id in porId)) ordem.push(item.id); porId[item.id]=item; } });
  return ordem.map(id=>porId[id]);
}
function mesclarUnidades(remoto, local){
  return [...new Set([...(remoto||[]), ...(local||[])])];
}

// Salva de forma segura: em vez de simplesmente sobrescrever o documento
// inteiro (o que apagaria qualquer coisa criada por outro aparelho enquanto
// esta aba estava com dados desatualizados na memória — a causa de perda de
// templates e escalas), busca a versão mais recente do servidor primeiro e
// MESCLA com a mudança local antes de gravar.
function saveState(s){
  state = s;
  if(FIREBASE_ATIVO && db){
    const docRef = db.collection('dcb').doc('estado');
    docRef.get().then(snap=>{
      const remoto = snap.exists ? snap.data() : null;
      const templatesRemotoMaisNovo = remoto && remoto.templatesVersao && s.templatesVersao && remoto.templatesVersao > s.templatesVersao;
      const mesclado = remoto ? {
        unidades: mesclarUnidades(remoto.unidades, s.unidades),
        // Templates são um objeto de configuração (não um array com id), então
        // não dá pra mesclar por item com segurança. Em vez disso, comparamos
        // qual lado tem a edição mais recente (templatesVersao) e usamos esse
        // por inteiro — isso é o que impede uma aba desatualizada de apagar
        // uma customização feita depois em outro aparelho.
        templates: templatesRemotoMaisNovo ? remoto.templates : s.templates,
        templatesVersao: templatesRemotoMaisNovo ? remoto.templatesVersao : (s.templatesVersao || remoto.templatesVersao || nowISO()),
        checklists: mesclarArraysPorId(remoto.checklists, s.checklists),
        resetHistorico: mesclarArraysPorId(remoto.resetHistorico, s.resetHistorico),
        trocasOleo: mesclarArraysPorId(remoto.trocasOleo, s.trocasOleo),
        escalas: mesclarArraysPorId(remoto.escalas, s.escalas),
        escalaRecorrencias: mesclarArraysPorId(remoto.escalaRecorrencias, s.escalaRecorrencias),
        notificacoesEscala: mesclarArraysPorId(remoto.notificacoesEscala, s.notificacoesEscala),
        // Produtos do estoque usam controle de versão (como os templates), porque
        // um admin pode EXCLUIR um produto — e uma mesclagem ingênua por id o
        // ressuscitaria. Quem editou por último (estoqueProdutosVersao) vence.
        estoqueProdutos: (remoto.estoqueProdutosVersao && s.estoqueProdutosVersao && remoto.estoqueProdutosVersao > s.estoqueProdutosVersao) ? (remoto.estoqueProdutos||[]) : (s.estoqueProdutos||[]),
        estoqueProdutosVersao: (remoto.estoqueProdutosVersao && s.estoqueProdutosVersao && remoto.estoqueProdutosVersao > s.estoqueProdutosVersao) ? remoto.estoqueProdutosVersao : (s.estoqueProdutosVersao || remoto.estoqueProdutosVersao || nowISO()),
        // Contagens têm id determinístico (unidade+produto+período), então mesclar
        // por id combina o trabalho de aparelhos diferentes sem duplicar.
        estoqueContagens: mesclarArraysPorId(remoto.estoqueContagens, s.estoqueContagens),
        estoqueHistorico: mesclarArraysPorId(remoto.estoqueHistorico, s.estoqueHistorico),
      } : s;
      state = mesclado;
      docRef.set(mesclado).catch(e=>{
        console.error('Erro ao salvar na nuvem', e);
        syncStatus = 'error';
      });
      render();
    }).catch(e=>{
      console.error('Erro ao buscar estado remoto antes de salvar; salvando mesmo assim', e);
      docRef.set(s).catch(e2=>{ console.error('Erro ao salvar na nuvem', e2); syncStatus='error'; });
    });
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  }
}

function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    const docRef = db.collection('dcb').doc('estado');
    docRef.onSnapshot(snap=>{
      if(snap.exists){
        const bruto = snap.data();
        state = mergeWithDefaults(bruto);
        const chavesAntigas = Object.keys(bruto.templates || {});
        const precisaMigrar = chavesAntigas.some(k=>k.split('|').length===2) && !chavesAntigas.some(k=>k.split('|').length===3);
        if(precisaMigrar){
          docRef.set(state).catch(e=>console.error('Erro ao salvar migração de dados', e));
        }
      } else {
        state = defaultState();
        docRef.set(state);
      }
      syncStatus = 'on';
      bootDone = true;
      render();
    }, err=>{
      console.error('Erro de sincronização', err);
      syncStatus = 'error';
      if(!bootDone){ state = loadStateLocal(); bootDone = true; }
      render();
    });
  }catch(e){
    console.error('Falha ao iniciar Firebase', e);
    syncStatus = 'error';
    state = loadStateLocal();
    bootDone = true;
    render();
  }
}

// Gera um ID determinístico a partir de unidade+setor+tipo+data. Isso é
// essencial para evitar duplicação: se dois colaboradores em aparelhos
// diferentes tentarem criar o checklist do dia quase ao mesmo tempo (antes
// da sincronização concluir), os dois vão calcular o MESMO id, então nunca
// existirão dois checklists "paralelos" para o mesmo turno.
function checklistIdDeterministico(unidade, setor, tipo, dataKey){
  const bruto = `${unidade}|${setor}|${tipo}|${dataKey}`;
  return 'cl_' + bruto.toLowerCase().replace(/[^a-z0-9]+/g,'_');
}

function openOrCreateChecklist(){
  const {unidade,setor,tipo} = currentSetup;
  const dk = todayKey();
  const idDeterministico = checklistIdDeterministico(unidade,setor,tipo,dk);
  // procura primeiro pelo id novo (determinístico); depois por compatibilidade
  // com registros antigos (criados antes desta correção, com id aleatório).
  let existing = state.checklists.find(c=>c.id===idDeterministico)
    || state.checklists.find(c=>c.unidade===unidade&&c.setor===setor&&c.tipo===tipo&&c.dataKey===dk);
  if(!existing){
    const tplKey = `${unidade}|${setor}|${tipo}`;
    const tpl = state.templates[tplKey] || [];
    existing = {
      id: idDeterministico, unidade, setor, tipo, dataKey: dk,
      tarefas: tpl.map(t=>({id:uid(), nome:t.nome, pontos:t.pontos, obrigatoria:t.obrigatoria, categoria:t.categoria||'Outros', dificuldade:t.dificuldade||'medio', feita:false, horaFeita:null, colaborador:null, atrasada:false})),
      abertoPor: currentUser().nome, abertoEm: nowISO(),
      encerramentos: [], pontosTotais:0,
    };
    state.checklists.push(existing);
    saveState(state);
  }
  currentChecklistId = existing.id;
  currentTab='checklist';
  initOpenCategorias(existing);
  render();
}

// Retorna a lista de "encerramentos" (pessoas que marcaram que encerraram a
// própria participação) de forma compatível com registros antigos, que só
// tinham um único finalizadoPor/finalizadoEm em vez do array atual.
function getEncerramentos(cl){
  if(cl.encerramentos) return cl.encerramentos;
  if(cl.finalizadoPor) return [{colaborador:cl.finalizadoPor, horario:cl.finalizadoEm}];
  return [];
}

// O checklist é considerado 100% concluído quando TODAS as tarefas
// obrigatórias estiverem marcadas — não importa quem marcou, nem se alguém
// "finalizou". Isso é sempre calculado na hora, nunca fica desatualizado.
function checklistEstaCompleto(cl){
  if(!cl.tarefas || cl.tarefas.length===0) return false;
  const obrig = cl.tarefas.filter(t=>t.obrigatoria);
  const alvo = obrig.length>0 ? obrig : cl.tarefas;
  return alvo.every(t=>t.feita);
}

// Soma exatamente os pontos que UM colaborador específico ganhou neste
// checklist (usada para o feedback pessoal ao "encerrar participação").
function pontosDoColaboradorNoChecklist(cl, nomeColaborador){
  let pts = 0;
  cl.tarefas.forEach(t=>{
    if(t.feita && t.colaborador===nomeColaborador) pts += t.atrasada ? Math.round(t.pontos/2) : t.pontos;
  });
  return pts;
}

function initOpenCategorias(cl){
  openCategorias = new Set();
  openCategoriasChecklistId = cl.id;
  const cats = groupByCategoria(cl.tarefas);
  if(cats.length>0) openCategorias.add(cats[0].categoria);
}

function groupByCategoria(tarefas){
  const map = {};
  tarefas.forEach(t=>{
    const c = t.categoria || 'Outros';
    if(!map[c]) map[c]=[];
    map[c].push(t);
  });
  const order = [...CATEGORIAS, 'Outros'];
  return order.filter(c=>map[c]).map(c=>({categoria:c, tarefas:map[c]}));
}

function renderTaskItem(cl, t){
  const souEuQueFiz = t.colaborador === currentUser().nome;
  const travada = t.feita && !isAdmin() && !souEuQueFiz;
  const dif = dificuldadeInfo(t.dificuldade);
  return `
    <div class="task-item ${t.feita?'done':''}">
      <button class="task-check" onclick="toggleTask('${cl.id}','${t.id}')" ${travada?'disabled':''} title="${travada?'Só quem concluiu ou um admin pode desmarcar':''}">${t.feita?'✓':''}</button>
      <div class="task-body">
        <div class="task-name">
          <span class="task-dif-badge" style="color:${dif.cor};background:${dif.fundo};">${dif.emoji} ${dif.label}</span>
          <span class="task-name-text">${t.nome}${t.obrigatoria?'<span class="task-req">obrigatória</span>':''}</span>
        </div>
        <span class="task-pts">+${t.pontos} pts${t.atrasada?' (atrasada, /2)':''}</span>
        ${t.feita ? `<div class="task-done-info ${t.atrasada?'task-late':''}">
          <span>👤 ${t.colaborador}${souEuQueFiz?' (você)':''}</span><span>🕐 ${fmtTime(t.horaFeita)}</span><span>📅 ${fmtDate(t.horaFeita)}</span>
        </div>` : ''}
        ${isAdmin() ? `<div class="task-admin-actions">
          <button class="icon-btn-sm" onclick="event.stopPropagation();openTaskEditModal('${cl.id}','${t.id}')" title="Editar tarefa">✎</button>
          <button class="icon-btn-sm" onclick="event.stopPropagation();removeTaskFromChecklist('${cl.id}','${t.id}')" title="Remover">🗑</button>
        </div>` : ''}
      </div>
    </div>
  `;
}

function toggleTask(clId, taskId){
  const cl = getChecklist(clId);
  const t = cl.tarefas.find(x=>x.id===taskId);
  if(!t) return;
  const estavaCompleto = checklistEstaCompleto(cl);
  if(t.feita){
    // Só quem concluiu a tarefa (ou um admin) pode desmarcá-la — evita que um
    // colaborador apague sem querer (ou por engano) o crédito de outra pessoa.
    if(!isAdmin() && t.colaborador !== currentUser().nome){
      showToast('Só quem concluiu esta tarefa (ou um admin) pode desmarcá-la');
      return;
    }
    t.feita=false; t.horaFeita=null; t.colaborador=null; t.atrasada=false;
  } else {
    t.feita=true; t.horaFeita=nowISO(); t.colaborador=currentUser().nome;
    const hour = new Date().getHours();
    t.atrasada = (cl.tipo==='Abertura' && hour>=11) || (cl.tipo==='Fechamento' && hour>=24);
  }
  recomputeChecklistTotalPoints(cl);
  saveState(state);
  const agoraCompleto = checklistEstaCompleto(cl);
  render();
  if(!estavaCompleto && agoraCompleto){
    showCelebration(cl);
  }
}

function askFinalize(){
  modal = {type:'confirm-finalize', payload:{clId:currentChecklistId}};
  render();
}
function doFinalize(){
  const cl = getChecklist(currentChecklistId);
  if(!cl.encerramentos) cl.encerramentos = [];
  // remove um encerramento anterior do mesmo colaborador, se houver, pra não acumular duplicado
  cl.encerramentos = cl.encerramentos.filter(e=>e.colaborador!==currentUser().nome);
  cl.encerramentos.push({colaborador: currentUser().nome, horario: nowISO()});
  saveState(state);
  modal=null;
  const meusPontos = pontosDoColaboradorNoChecklist(cl, currentUser().nome);
  showToast(`Participação encerrada. Você ganhou ${meusPontos} pontos neste checklist.`);
}

function showCelebration(cl){
  const contribuintes = [...new Set(cl.tarefas.filter(t=>t.feita).map(t=>t.colaborador))];
  const overlay = document.createElement('div');
  overlay.className='celebrate-overlay';
  overlay.innerHTML = `
    <div class="celebrate-emoji">🎉🍔🎉</div>
    <h2>Checklist 100% concluído!</h2>
    <div class="celebrate-pts">${cl.pontosTotais||0}</div>
    <p>pontos gerados pela equipe: ${contribuintes.join(', ')||'—'}</p>
    <button class="btn btn-primary" onclick="this.closest('.celebrate-overlay').remove();">Show de bola!</button>
  `;
  document.body.appendChild(overlay);
}

/* ================= RANKING ================= */
function computeRanking(monthKey, unidadeFiltro){
  const mk = monthKey || todayKey().slice(0,7);
  const byUser = {};
  state.checklists.forEach(cl=>{
    if(!cl.dataKey.startsWith(mk)) return;
    if(unidadeFiltro && cl.unidade!==unidadeFiltro) return;
    const contribuiuNesteChecklist = new Set();
    cl.tarefas.forEach(t=>{
      if(t.feita && t.colaborador){
        if(!byUser[t.colaborador]) byUser[t.colaborador]={nome:t.colaborador,checklists:0,tarefas:0,pontos:0,ultima:null};
        byUser[t.colaborador].tarefas += 1;
        byUser[t.colaborador].pontos += t.atrasada? Math.round(t.pontos/2): t.pontos;
        if(!byUser[t.colaborador].ultima || t.horaFeita>byUser[t.colaborador].ultima) byUser[t.colaborador].ultima=t.horaFeita;
        contribuiuNesteChecklist.add(t.colaborador);
      }
    });
    // "checklists" agora conta quantos checklists diferentes cada pessoa
    // realmente ajudou a fazer (não depende mais de quem apertou "finalizar").
    contribuiuNesteChecklist.forEach(nome=>{ byUser[nome].checklists += 1; });
  });
  const arr = Object.values(byUser).filter(u=>u.pontos>0 || u.checklists>0 || u.tarefas>0);
  arr.sort((a,b)=>b.pontos-a.pontos);
  return arr;
}

      ${p3?`<div class="podium-spot podium-3"><div class="podium-avatar">${initials(p3.nome)}</div><div class="podium-name">${p3.nome}</div><div class="podium-pts">${p3.pontos} pts</div><div class="podium-bar"><span class="podium-medal">3</span></div></div>`:'<div class="podium-spot"></div>'}

/* ================= HISTÓRICO ================= */
let histSearch = '';
let histFiltroUnidade='';
let histFiltroSetor='';
let histFiltroTipo='';
let histFiltroData='';
let histFiltroUsuario='';

function renderHistoricoView(){
  const admin = isAdmin();
  if(!admin && !currentSetup.unidade){
    return `<div class="empty-state">
      <div class="ic">🏬</div>
      Escolha sua unidade para ver o histórico.
      <div style="margin-top:16px;"><button class="btn btn-primary" onclick="currentTab='checklist';render();">Escolher unidade</button></div>
    </div>`;
  }
  let list = [...state.checklists].filter(c=>!c.dataKey.startsWith('arq-'));
  if(!admin){
    const nome = currentUser().nome;
    // Colaboradores só veem o histórico da própria unidade em que estão atuando, com seus próprios registros.
    list = list.filter(c=> c.unidade===currentSetup.unidade && (c.abertoPor===nome || getEncerramentos(c).some(e=>e.colaborador===nome) || c.tarefas.some(t=>t.colaborador===nome)));
  }
  if(histFiltroUnidade) list = list.filter(c=>c.unidade===histFiltroUnidade);
  if(histFiltroSetor) list = list.filter(c=>c.setor===histFiltroSetor);
  if(histFiltroTipo) list = list.filter(c=>c.tipo===histFiltroTipo);
  if(histFiltroData) list = list.filter(c=>c.dataKey===histFiltroData);
  if(admin && histFiltroUsuario) list = list.filter(c=> c.abertoPor===histFiltroUsuario || getEncerramentos(c).some(e=>e.colaborador===histFiltroUsuario) || c.tarefas.some(t=>t.colaborador===histFiltroUsuario));
  if(histSearch.trim()){
    const q = histSearch.toLowerCase();
    list = list.filter(c => `${c.unidade} ${c.setor} ${c.tipo} ${c.abertoPor} ${getEncerramentos(c).map(e=>e.colaborador).join(' ')}`.toLowerCase().includes(q));
  }
  list.sort((a,b)=> (b.abertoEm||'').localeCompare(a.abertoEm||''));

  return `
    <div class="section-title"><span>🕐 Histórico</span><div class="line"></div></div>
    <div class="search-box">
      <span>🔎</span>
      <input placeholder="Buscar por unidade, setor, colaborador..." value="${histSearch}" oninput="histSearch=this.value;render();">
    </div>
    <div class="filter-bar">
      ${admin ? `<select onchange="histFiltroUnidade=this.value;render();"><option value="">Unidade (todas)</option>${state.unidades.map(u=>`<option ${histFiltroUnidade===u?'selected':''}>${u}</option>`).join('')}</select>` : ''}
      <select onchange="histFiltroSetor=this.value;render();"><option value="">Setor (todos)</option>${SETORES.map(s=>`<option ${histFiltroSetor===s?'selected':''}>${s}</option>`).join('')}</select>
      <select onchange="histFiltroTipo=this.value;render();"><option value="">Tipo (todos)</option>${TIPOS.map(t=>`<option ${histFiltroTipo===t?'selected':''}>${t}</option>`).join('')}</select>
      <input type="date" onchange="histFiltroData=this.value;render();" value="${histFiltroData}">
      ${admin ? `<select onchange="histFiltroUsuario=this.value;render();"><option value="">Funcionário (todos)</option>${USERS.map(u=>`<option ${histFiltroUsuario===u.nome?'selected':''}>${u.nome}</option>`).join('')}</select>`:''}
    </div>

    ${admin ? `<div class="field-row" style="margin-top:0;margin-bottom:16px;">
      <button class="btn btn-secondary btn-sm" onclick="exportPDF()">⬇ Exportar PDF</button>
      <button class="btn btn-secondary btn-sm" onclick="exportExcel()">⬇ Exportar Excel</button>
    </div>` : ''}

    ${list.length===0 ? `<div class="empty-state"><div class="ic">📭</div>Nenhum registro encontrado.</div>` : list.map(c=>{
      const completo = checklistEstaCompleto(c);
      const encerramentos = getEncerramentos(c);
      return `
      <div class="hist-row" onclick="currentChecklistId='${c.id}';currentTab='checklist';render();" style="cursor:pointer;">
        <div class="hist-status-dot ${completo?'completo':'pendente'}"></div>
        <div class="hist-body">
          <div class="hist-title">${c.unidade} · ${c.setor} · ${c.tipo}</div>
          <div class="hist-sub">${fmtDate(c.abertoEm)} · aberto por ${c.abertoPor}${encerramentos.length? ' · encerrado por '+encerramentos.map(e=>e.colaborador).join(', ') : ''}</div>
        </div>
        <div class="hist-pts">${c.pontosTotais||0}</div>
      </div>
    `;}).join('')}
  `;
}

function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text('Dom Cellebre Burger — Relatório de Checklists', 14, 16);
  doc.setFontSize(10);
  doc.text('Gerado em ' + fmtDateTime(nowISO()), 14, 22);
  const rows = state.checklists.filter(c=>!c.dataKey.startsWith('arq-')).map(c=>[
    fmtDate(c.abertoEm), c.unidade, c.setor, c.tipo, c.abertoPor,
    getEncerramentos(c).map(e=>e.colaborador).join(', ')||'-',
    checklistEstaCompleto(c)?'Completo':'Pendente', String(c.pontosTotais||0)
  ]);
  doc.autoTable({

let escalaColaboradorSelecionado = null;
let escalaMesAtual = null;

function renderEscalaView(){
  const admin = isAdmin();
  const userIdAlvo = admin ? escalaColaboradorSelecionado : currentUser().id;
  if(!userIdAlvo) return renderEscalaSeletor();
  return renderEscalaCalendario(userIdAlvo);
}

function renderEscalaSeletor(){
  return `
    <div class="section-title"><span>⏰ Escala da equipe</span><div class="line"></div></div>
    <div class="setup-sub" style="margin-bottom:16px;">Toque em um colaborador para ver a escala dele.</div>
    ${USERS.map(u=>`
      <button class="option-card" style="width:100%;text-align:left;" onclick="escalaColaboradorSelecionado='${u.id}';render();">
        <div class="option-icon">${initials(u.nome)}</div>
        <div><div class="option-title">${u.nome}</div><div class="option-sub">${u.role==='admin'?'Administrador':'Equipe'}</div></div>
      </button>
    `).join('')}
  `;
}

function renderEscalaCalendario(userId){
  const admin = isAdmin();
  const user = USERS.find(u=>u.id===userId);
  if(!escalaMesAtual) escalaMesAtual = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  const ano = escalaMesAtual.getFullYear();
  const mes = escalaMesAtual.getMonth();
  const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
  const totalDias = new Date(ano, mes+1, 0).getDate();
  const hojeKey = todayKey();
  const mesLabel = escalaMesAtual.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  let celulas = [];
  for(let i=0;i<primeiroDiaSemana;i++) celulas.push(null);
  for(let d=1; d<=totalDias; d++) celulas.push(d);

  return `
    <div class="section-title"><span>⏰ Escala${admin?` — ${user.nome}`:''}</span><div class="line"></div></div>
    ${admin ? `<button class="btn btn-ghost btn-sm" style="margin-bottom:14px;" onclick="escalaColaboradorSelecionado=null;render();">← Trocar colaborador</button>` : ''}
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <button class="icon-btn-sm" onclick="mudarMesEscala(-1)">‹</button>
        <div style="font-weight:800;text-transform:capitalize;">${mesLabel}</div>
        <button class="icon-btn-sm" onclick="mudarMesEscala(1)">›</button>
      </div>
      <div class="cal-grid cal-header">
        ${DIAS_SEMANA_LABEL.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">
        ${celulas.map(d=>{
          if(d===null) return `<div class="cal-cell empty"></div>`;
          const dk = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const entry = getEscalaEfetivaDia(userId, dk);
          const tipoInfo = entry ? tipoEscalaInfo(entry.tipo) : null;
          const isHoje = dk===hojeKey;
          return `<div class="cal-cell ${isHoje?'hoje':''}" onclick="abrirDiaEscala('${userId}','${dk}')">
            <div class="cal-daynum">${d}</div>
            ${tipoInfo?`<div class="cal-dot" style="background:${tipoInfo.cor}"></div>`:''}
            ${entry && entry._origemRecorrencia ? `<div class="cal-recorrencia-badge">🔁</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="section-title"><span>Legenda</span><div class="line"></div></div>
    <div class="legend-row">
      ${TIPOS_ESCALA.map(t=>`<div class="legend-item"><span class="legend-dot" style="background:${t.cor}"></span>${t.emoji} ${t.label}</div>`).join('')}
      <div class="legend-item"><span>🔁</span> Horário recorrente</div>
    </div>
    ${renderListaRecorrencias(userId)}
  `;
}
function renderListaRecorrencias(userId){
  if(!isAdmin()) return '';
  const user = USERS.find(u=>u.id===userId);
  const regras = (state.escalaRecorrencias||[]).filter(r=>r.userId===userId);
  return `
    <div class="section-title"><span>🔁 Horários recorrentes</span><div class="line"></div></div>
    <button class="btn btn-secondary btn-block" style="margin-bottom:12px;" onclick="abrirNovaRecorrencia('${userId}')">+ Repetir horário</button>
    ${regras.length===0 ? `<div style="font-size:12.5px;color:var(--cinza-claro);">Nenhum horário recorrente cadastrado para ${user.nome}.</div>` : regras.map(r=>`
      <div class="manage-task-row">
        <div>
          <div class="manage-task-name">${r.diasSemana.map(d=>DIAS_SEMANA_LABEL[d]).join(', ')} · ${r.entrada}–${r.saida}</div>
          <div class="manage-task-meta">${tipoEscalaInfo(r.tipo).emoji} ${tipoEscalaInfo(r.tipo).label} · a partir de ${fmtDateOnly(r.dataInicio)}${r.dataFim? ' até '+fmtDateOnly(r.dataFim) : ' · sem data final'}</div>
        </div>

        <button class="icon-btn-sm" onclick="excluirRecorrenciaClick('${r.id}')">🗑</button>
      </div>
    `).join('')}
  `;
}

/* ---------- MODAL: NOVA/EDITAR ESCALA RECORRENTE ---------- */
function abrirNovaRecorrencia(userIdPadrao){
  const padrao = userIdPadrao || escalaColaboradorSelecionado;
  modal = {type:'nova-recorrencia', payload:{
    editing:false, userIds: padrao ? [padrao] : [],
    diasSemana:[], entrada:'', saida:'', tipo:'trabalho', unidade:'', observacoes:'',
    dataInicio: todayKey(), dataFim:null, semDataFim:true,
  }};
  render();
}
function editarNovaRecorrenciaAbrir(id){
  const r = state.escalaRecorrencias.find(x=>x.id===id);
  modal = {type:'nova-recorrencia', payload:{
    editing:true, id, userIds:[r.userId], diasSemana:[...r.diasSemana], entrada:r.entrada, saida:r.saida,
    tipo:r.tipo, unidade:r.unidade||'', observacoes:r.observacoes||'',
    dataInicio:r.dataInicio, dataFim:r.dataFim, semDataFim: !r.dataFim,
  }};
  render();
}
function toggleColaboradorRecorrencia(userId){
  if(modal.payload.editing) return; // ao editar uma regra já existente, o colaborador não muda
  const idx = modal.payload.userIds.indexOf(userId);
  if(idx>=0) modal.payload.userIds.splice(idx,1); else modal.payload.userIds.push(userId);
  render();
}
function toggleDiaSemanaRecorrencia(dia){
  const idx = modal.payload.diasSemana.indexOf(dia);
  if(idx>=0) modal.payload.diasSemana.splice(idx,1); else modal.payload.diasSemana.push(dia);
  render();
}
function toggleSemDataFimRecorrencia(){
  modal.payload.semDataFim = !modal.payload.semDataFim;
  if(modal.payload.semDataFim) modal.payload.dataFim = null;
  render();
}
function confirmarNovaRecorrencia(){
  const p = modal.payload;
  if(p.userIds.length===0){ showToast('Selecione ao menos um colaborador'); return; }
  if(p.diasSemana.length===0){ showToast('Selecione ao menos um dia da semana'); return; }
  if(!p.dataInicio){ showToast('Escolha a data de início'); return; }
  if(!p.entrada || !p.saida){ showToast('Preencha entrada e saída'); return; }
  const dadosBase = {
    diasSemana: p.diasSemana, entrada: p.entrada, saida: p.saida,
    tipo: p.tipo, unidade: p.unidade, observacoes: p.observacoes,
    dataInicio: p.dataInicio, dataFim: p.semDataFim ? null : (p.dataFim || null),
  };
  if(p.editing){
    editarRecorrencia(p.id, {...dadosBase, userId: p.userIds[0]});
  } else {
    p.userIds.forEach(userId => criarRecorrenciaSemSalvar({...dadosBase, userId}));
    saveState(state);
  }
  closeModal();
  showToast(p.editing ? 'Recorrência atualizada' : `Recorrência criada para ${p.userIds.length} colaborador${p.userIds.length>1?'es':''}`);
}
function confirmarExcluirRecorrencia(){
  excluirRecorrencia(modal.payload.id);
  closeModal();
  showToast('Recorrência excluída');
}
function excluirRecorrenciaClick(id){
  excluirRecorrencia(id);
  render();
  showToast('Recorrência excluída');
}

function drawDashboardCharts(){
  statsCharts.forEach(c=>c.destroy());
  statsCharts = [];
  const gridColor = 'rgba(255,255,255,.08)';
  const textColor = '#B8B8B8';
  Chart.defaults.color = textColor;
  Chart.defaults.font.family = 'Inter';

  const dk = todayKey();
  const mk = dk.slice(0,7);
  const ranking = computeRanking(mk, dashFiltroUnidade || null);

  const c1 = document.getElementById('chartProdutividade');
  if(c1) statsCharts.push(new Chart(c1, {
    type:'bar',
    data:{ labels: ranking.map(r=>r.nome), datasets:[{label:'Pontos', data:ranking.map(r=>r.pontos), backgroundColor:'#FFB800', borderRadius:8}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}},y:{grid:{color:gridColor}}} }
  }));

  let all = state.checklists.filter(c=>!c.dataKey.startsWith('arq-'));
  const scopeAll = dashFiltroUnidade ? all.filter(c=>c.unidade===dashFiltroUnidade) : all;

  const porUnidade = {};
  state.unidades.forEach(u=>porUnidade[u]=0);
  scopeAll.forEach(c=>{ porUnidade[c.unidade]=(porUnidade[c.unidade]||0)+1; });
  const c2 = document.getElementById('chartUnidade');
  if(c2) statsCharts.push(new Chart(c2, {
    type:'doughnut',
    data:{ labels:Object.keys(porUnidade), datasets:[{data:Object.values(porUnidade), backgroundColor:['#FFB800','#3D8EF5','#3FA33B','#E4483A']}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
  }));

  const porSetor = {Cozinha:0, Caixa:0};
  scopeAll.forEach(c=>{ porSetor[c.setor]=(porSetor[c.setor]||0)+1; });
  const c3 = document.getElementById('chartSetor');
  if(c3) statsCharts.push(new Chart(c3, {
    type:'doughnut',
    data:{ labels:Object.keys(porSetor), datasets:[{data:Object.values(porSetor), backgroundColor:['#FFB800','#3D8EF5']}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
  }));

  const weekMap = {};
  scopeAll.forEach(c=>{
    if(!checklistEstaCompleto(c)) return;
    const encerramentos = getEncerramentos(c);
    const dataRef = encerramentos.length ? encerramentos[encerramentos.length-1].horario : c.abertoEm;
    const d = new Date(dataRef);
    const weekStart = new Date(d); weekStart.setDate(d.getDate()-d.getDay());
    const wk = weekStart.toISOString().slice(0,10);
    weekMap[wk] = (weekMap[wk]||0) + (c.pontosTotais||0);
  });
  const weeks = Object.keys(weekMap).sort().slice(-8);
  const c4 = document.getElementById('chartSemana');
  if(c4) statsCharts.push(new Chart(c4, {
    type:'line',
    data:{ labels: weeks.map(w=>fmtDate(w)), datasets:[{label:'Pontos', data: weeks.map(w=>weekMap[w]), borderColor:'#3FA33B', backgroundColor:'rgba(63,163,59,.15)', fill:true, tension:.3}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{display:false}},y:{grid:{color:gridColor}}} }
  }));
}
